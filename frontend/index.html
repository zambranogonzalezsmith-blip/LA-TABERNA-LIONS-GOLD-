<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Taberna LIONS-GOLD | Mercado P2P</title>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Mercatus Uniti: Albion P2P</h1>
            <div id="status-network">Red Segura: TRX/USDT/SILVER</div>
        </div>
    </header>

    <main id="app">
        <section id="trade-form" class="panel">
            <h2>Registrar Operación</h2>
            <div class="input-group">
                <input type="text" id="sellerName" placeholder="Vendedor (IGN)">
                <input type="number" id="amount" placeholder="Monto Total" oninput="calculateFee()">
            </div>
            <div class="fee-preview">
                <p>Comisión LIONS-GOLD (0.06%): <span id="fee-amount">0.00</span></p>
            </div>
            <button id="btn-create" onclick="createTrade()">INICIAR TRANSACCIÓN</button>
        </section>

        <hr>

        <section id="offers-list">
            <h2>Historial de Trades</h2>
            <div id="trades-container">
                </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
