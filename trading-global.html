<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIONS-GOLD | MONITOR DE RECOLECCIÓN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=MedievalSharp&family=Inter:wght@400;700&display=swap');
        
        :root { --gold: #c5a059; --gold-glow: rgba(197, 160, 89, 0.4); }
        body { 
            background: #050505; color: #e2e2e2; font-family: 'Inter', sans-serif;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.98)), url('https://p325k7wa.twic.pics/high/albion-online/albion-online/01-news/og-albion-online.jpg');
            background-attachment: fixed; background-size: cover;
        }
        .font-mythic { font-family: 'Cinzel Decorative', serif; }
        .font-medieval { font-family: 'MedievalSharp', cursive; }
        .glass-panel { background: rgba(15, 17, 20, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.2); }
        
        .input-gold { background: rgba(0, 0, 0, 0.6); border: 1px solid #3d3423; color: white; padding: 12px; outline: none; transition: 0.3s; }
        .input-gold:focus { border-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }
        
        .city-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(197, 160, 89, 0.1); transition: 0.3s; }
        .city-card:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.08); }
        
        .best-city { border-top: 4px solid #10b981 !important; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-black/90 border-b border-[#c5a059]/30 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-pickaxe text-[#c5a059] text-xl"></i>
                <span class="font-mythic text-[#c5a059] tracking-widest text-lg uppercase">Logística de Recolección</span>
            </div>
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">LIONS-GOLD Intelligence</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        
        <section class="glass-panel p-8 mb-10 border-2 border-[#c5a059]/20">
            <h1 class="font-mythic text-xl text-center text-[#c5a059] mb-8 uppercase tracking-[0.3em]">Evaluador de Materias Primas</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-amber-600 uppercase font-black tracking-widest">Tipo de Recurso</label>
                    <select id="resourceType" class="input-gold text-sm">
                        <option value="WOOD">Madera (Logs)</option>
                        <option value="ORE">Mineral (Ore)</option>
                        <option value="FIBER">Fibra (Fiber)</option>
                        <option value="HIDE">Piel (Hide)</option>
                        <option value="ROCK">Piedra (Rock)</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-amber-600 uppercase font-black tracking-widest">Tier / Encant.</label>
                    <div class="flex gap-1">
                        <select id="tier" class="input-gold text-sm flex-1">
                            <option value="T2">T2</option><option value="T3">T3</option><option value="T4" selected>T4</option>
                            <option value="T5">T5</option><option value="T6">T6</option><option value="T7">T7</option><option value="T8">T8</option>
                        </select>
                        <select id="enchant" class="input-gold text-sm flex-1">
                            <option value="">.0</option><option value="_LEVEL1">.1</option>
                            <option value="_LEVEL2">.2</option><option value="_LEVEL3">.3</option><option value="_LEVEL4">.4</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-amber-600 uppercase font-black tracking-widest">Cant. en Inventario</label>
                    <input type="number" id="quantity" value="100" min="1" class="input-gold text-sm font-bold">
                </div>

                <div class="flex flex-col justify-end">
                    <button onclick="calculateResources()" class="bg-[#c5a059] text-black font-black py-3.5 hover:bg-white transition-all uppercase text-[10px] tracking-widest">
                        Calcular Valor de Carga
                    </button>
                </div>
            </div>
            
            <div class="mt-4 flex justify-between items-center border-t border-white/5 pt-4">
                <span id="resouceId" class="text-[9px] font-mono text-gray-500 uppercase tracking-tighter">ID: -</span>
                <span class="text-[9px] text-green-500 font-bold uppercase tracking-widest animate-pulse">Servidor Americas Online</span>
            </div>
        </section>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 opacity-20 border-2 border-dashed border-white/10">
                <i class="fa-solid fa-boxes-stacked text-6xl mb-4"></i>
                <p class="font-medieval text-lg uppercase tracking-[0.2em]">Configura el recurso para ver la comparativa de ciudades</p>
            </div>
        </div>

    </main>

    <script>
        const CITIES = ["Caerleon", "Lymhurst", "Bridgewatch", "Martlock", "Thetford", "Fort Sterling", "Brecilien"];

        async function calculateResources() {
            const res = document.getElementById('resourceType').value;
            const tier = document.getElementById('tier').value;
            const enchant = document.getElementById('enchant').value;
            const qty = parseInt(document.getElementById('quantity').value) || 1;
            const grid = document.getElementById('resultsGrid');
            
            // Construcción del ID para recursos: T4_WOOD o T4_WOOD_LEVEL1
            const fullId = `${tier}_${res}${enchant}`;
            document.getElementById('resouceId').innerText = `ID REGISTRADO: ${fullId}`;

            grid.innerHTML = '<div class="col-span-full text-center py-12 font-medieval text-amber-500 animate-pulse">Sincronizando con los mercados de las ciudades...</div>';

            try {
                const url = `https://west.albion-online-data.com/api/v2/stats/prices/${fullId}?locations=${CITIES.join(',')}`;
                const response = await fetch(url);
                const data = await response.json();

                if (!data || data.length === 0 || data.every(d => d.sell_price_min === 0)) {
                    grid.innerHTML = '<div class="col-span-full text-center py-10 glass-panel border-red-900/30 font-mythic text-red-500 uppercase">Sin datos recientes para este recurso.</div>';
                    return;
                }

                grid.innerHTML = '';
                
                // Ordenar: Ciudad con mejor precio de compra primero
                data.sort((a, b) => b.sell_price_min - a.sell_price_min);

                data.forEach((stat, index) => {
                    if (stat.sell_price_min === 0) return;

                    const unitPrice = stat.sell_price_min;
                    const totalValue = unitPrice * qty;
                    const isBest = index === 0;

                    const card = document.createElement('div');
                    card.className = `city-card p-6 rounded-sm flex flex-col justify-between ${isBest ? 'best-city' : ''}`;
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="font-mythic text-amber-500 text-lg uppercase">${stat.city}</h3>
                                ${isBest ? '<i class="fa-solid fa-crown text-amber-500 text-xs animate-bounce"></i>' : ''}
                            </div>
                            
                            <div class="space-y-4">
                                <div class="flex justify-between items-center text-xs pb-2 border-b border-white/5">
                                    <span class="text-gray-500 uppercase">Precio Unidad</span>
                                    <span class="text-white font-bold">${unitPrice.toLocaleString()} <i class="fa-solid fa-coins text-[10px] text-amber-600"></i></span>
                                </div>
                                <div class="bg-black/60 p-4 rounded-sm border border-white/5">
                                    <p class="text-[9px] text-amber-600 font-black uppercase mb-1 tracking-widest">Valor de tu Inventario</p>
                                    <p class="text-2xl font-black text-green-500 tracking-tighter">
                                        ${totalValue.toLocaleString()} <span class="text-[10px] uppercase font-bold text-green-700">Silver</span>
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div class="mt-8 flex justify-between items-center opacity-40 text-[8px] font-mono">
                            <span>Sincronizado: ${new Date(stat.sell_price_min_date + 'Z').toLocaleTimeString()}</span>
                            <span class="bg-amber-900 px-2 py-0.5 rounded text-amber-500 font-bold uppercase">${tier}.${enchant ? enchant.slice(-1) : '0'}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                grid.innerHTML = '<div class="col-span-full text-center py-10 text-red-500 uppercase font-black">Error de conexión con el Gran Registro de Precios.</div>';
            }
        }
    </script>
</body>
</html>
