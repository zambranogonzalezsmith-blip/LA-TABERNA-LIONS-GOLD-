<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIONS-GOLD | CALCULADORA DE CARGAMENTO GLOBAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=MedievalSharp&family=Inter:wght@400;700&display=swap');
        
        :root { --gold: #c5a059; --gold-glow: rgba(197, 160, 89, 0.4); }
        body { 
            background: #050505; color: #e2e2e2; font-family: 'Inter', sans-serif;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.98)), url('https://p325k7wa.twic.pics/high/albion-online/albion-online/01-news/og-albion-online.jpg');
            background-attachment: fixed; background-size: cover;
        }
        .font-mythic { font-family: 'Cinzel Decorative', serif; }
        .font-medieval { font-family: 'MedievalSharp', cursive; }
        .glass-panel { background: rgba(15, 17, 20, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.2); }
        .mythic-border { border: 2px solid; border-image: linear-gradient(to bottom, #c5a059, #4a3a1a) 1; }
        
        .city-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(197, 160, 89, 0.1); transition: 0.3s; }
        .city-card:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.08); transform: translateY(-3px); }
        
        .input-gold { background: rgba(0, 0, 0, 0.6); border: 1px solid #3d3423; color: white; padding: 12px; outline: none; }
        .input-gold:focus { border-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }
        
        .best-option { border-left: 4px solid #10b981 !important; background: rgba(16, 185, 129, 0.05) !important; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-black/90 border-b border-[#c5a059]/30 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-calculator text-[#c5a059] text-xl"></i>
                <span class="font-mythic text-[#c5a059] tracking-widest text-lg uppercase">Inteligencia de Carga LIONS</span>
            </div>
            <a href="index.html" target="_self" class="font-medieval text-gray-400 hover:text-white transition-colors flex items-center gap-2 text-sm uppercase">
                <i class="fa-solid fa-arrow-left"></i> Regresar
            </a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        
        <section class="glass-panel mythic-border p-8 mb-10">
            <h1 class="font-mythic text-2xl text-center text-[#c5a059] mb-8 uppercase">Configurador de Manifiesto</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-amber-600 uppercase font-bold">Mercancía</label>
                    <select id="baseItem" class="input-gold text-sm">
                        <option value="BAG">Bolsa (Bag)</option>
                        <option value="CAPE">Capa (Cape)</option>
                        <option value="MOUNT_OX">Buey (Ox)</option>
                        <option value="MOUNT_HORSE">Caballo (Horse)</option>
                        <option value="HEAD_PLATE_SET1">Casco de Placas</option>
                        <option value="ARMOR_PLATE_SET1">Armadura de Placas</option>
                        <option value="SHOES_PLATE_SET1">Botas de Placas</option>
                        <option value="MAIN_BROADSWORD">Espada Ancha</option>
                        <option value="MAIN_AXE">Hacha</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-amber-600 uppercase font-bold">Tier & Encantamiento</label>
                    <div class="flex gap-1">
                        <select id="tier" class="input-gold text-sm flex-1">
                            <option value="T4">T4</option>
                            <option value="T5">T5</option>
                            <option value="T6">T6</option>
                            <option value="T7">T7</option>
                            <option value="T8">T8</option>
                        </select>
                        <select id="enchant" class="input-gold text-sm flex-1">
                            <option value="">.0</option>
                            <option value="@1">.1</option>
                            <option value="@2">.2</option>
                            <option value="@3">.3</option>
                            <option value="@4">.4</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-amber-600 uppercase font-bold">Cantidad de Unidades</label>
                    <input type="number" id="quantity" value="1" min="1" class="input-gold text-sm font-bold">
                </div>

                <div class="flex flex-col justify-end">
                    <button onclick="calculateGlobalTrade()" class="bg-[#c5a059] text-black font-black py-3 hover:brightness-110 transition-all uppercase text-sm tracking-widest">
                        Calcular Valor
                    </button>
                </div>
            </div>

            <div class="mt-6 p-4 bg-black/40 border border-amber-900/30">
                <p class="text-[10px] text-gray-500 uppercase">ID Generado automáticamente: <span id="generatedId" class="text-amber-500 font-mono">-</span></p>
            </div>
        </section>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

    </main>

    <script>
        const CITIES = ["Caerleon", "Black Market", "Lymhurst", "Bridgewatch", "Martlock", "Thetford", "Fort Sterling", "Brecilien"];

        async function calculateGlobalTrade() {
            const base = document.getElementById('baseItem').value;
            const tier = document.getElementById('tier').value;
            const enchant = document.getElementById('enchant').value;
            const qty = parseInt(document.getElementById('quantity').value) || 1;
            const grid = document.getElementById('resultsGrid');
            
            // Construcción del ID: T4_BAG@1
            const fullId = `${tier}_${base}${enchant}`;
            document.getElementById('generatedId').innerText = fullId;

            grid.innerHTML = '<div class="col-span-full text-center py-10 animate-pulse font-medieval text-amber-600">Consultando registros de las ciudades...</div>';

            try {
                const url = `https://west.albion-online-data.com/api/v2/stats/prices/${fullId}?locations=${CITIES.join(',')}`;
                const response = await fetch(url);
                const data = await response.json();

                if (!data || data.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-red-500">No hay datos de mercado recientes para esta combinación.</div>';
                    return;
                }

                grid.innerHTML = '';
                
                // Ordenar para encontrar el mejor precio
                data.sort((a, b) => b.sell_price_min - a.sell_price_min);

                data.forEach((stat, index) => {
                    if (stat.sell_price_min === 0) return;

                    const unitPrice = stat.sell_price_min;
                    const totalPrice = unitPrice * qty;
                    const isBest = index === 0;

                    const card = document.createElement('div');
                    card.className = `city-card p-6 rounded-sm ${isBest ? 'best-option' : ''}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-mythic text-amber-500">${stat.city}</h3>
                            ${isBest ? '<span class="text-[8px] bg-green-900 text-green-400 px-2 py-1 rounded-full uppercase font-bold">Mejor Venta</span>' : ''}
                        </div>
                        
                        <div class="space-y-4">
                            <div class="flex justify-between items-end border-b border-white/5 pb-2">
                                <span class="text-[10px] text-gray-500 uppercase">Precio Unitario</span>
                                <span class="font-bold text-white">${unitPrice.toLocaleString()} <i class="fa-solid fa-coins text-[10px] text-amber-500"></i></span>
                            </div>
                            
                            <div class="flex justify-between items-end bg-black/30 p-2">
                                <span class="text-[10px] text-amber-600 uppercase font-black">Valor del Lote (${qty})</span>
                                <span class="font-black text-xl text-green-500">${totalPrice.toLocaleString()} <i class="fa-solid fa-coins text-sm"></i></span>
                            </div>
                        </div>

                        <div class="mt-4 text-[9px] text-gray-600 uppercase flex justify-between">
                            <span>Sinc: ${new Date(stat.sell_price_min_date + 'Z').toLocaleTimeString()}</span>
                            <span>Q${stat.quality}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                grid.innerHTML = '<div class="col-span-full text-center text-red-500">Error de conexión con la red de datos.</div>';
            }
        }
    </script>

</body>
</html>
