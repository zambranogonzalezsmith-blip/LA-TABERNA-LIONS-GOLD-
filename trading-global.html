<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Trading | LIONS-GOLD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .panel-ui { background: #0f0f0f; border: 1px solid #333; }
        .gold-glow { text-shadow: 0 0 10px rgba(197, 160, 89, 0.5); }
    </style>
</head>
<body class="bg-[#050505] text-gray-200 p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 border-b border-[#c5a059] pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-[#c5a059] gold-glow">CENTRO DE MERCADO</h1>
                <p class="text-sm text-gray-500 uppercase tracking-widest">Inteligencia Económica - Lymhurst Division</p>
            </div>
            <a href="index.html" class="text-sm text-gray-400 hover:text-white">← Volver al Bastión</a>
        </header>

        <div class="panel-ui p-6 rounded-lg mb-8 flex gap-4">
            <input type="text" id="itemInput" placeholder="Ej: T5_ORE (Inglés)" class="flex-1 bg-black p-3 border border-gray-700 rounded focus:border-[#c5a059] outline-none">
            <button onclick="fetchMarket()" class="bg-[#c5a059] text-black font-bold px-8 py-3 rounded uppercase hover:bg-white transition-all">Analizar</button>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Los resultados se inyectan aquí -->
        </div>
    </div>

    <script>
        async function fetchMarket() {
            const item = document.getElementById('itemInput').value;
            const resContainer = document.getElementById('results');
            if(!item) return;

            resContainer.innerHTML = '<div class="col-span-3 text-center text-[#c5a059]">Escaneando nodos de Albion...</div>';
            
            try {
                const response = await fetch(`https://www.albion-online-data.com/api/v2/stats/prices/${item}.json`);
                const data = await response.json();
                
                resContainer.innerHTML = data.map(d => `
                    <div class="panel-ui p-4 rounded border-l-4 border-[#c5a059] hover:bg-[#1a1a1a] transition-all">
                        <div class="text-xl font-bold text-[#c5a059]">${d.city}</div>
                        <div class="mt-2 text-sm text-gray-400">Precio Venta Min:</div>
                        <div class="text-2xl font-mono text-green-400">${d.sell_price_min.toLocaleString()} <span class="text-sm">Plata</span></div>
                        <div class="mt-4 text-[10px] text-gray-600 uppercase">Refresco: ${new Date(d.sell_price_min_date).toLocaleTimeString()}</div>
                    </div>
                `).join('');
            } catch(e) {
                resContainer.innerHTML = '<div class="col-span-3 text-red-500 text-center">Error: Verifica el nombre del ítem (Inglés).</div>';
            }
        }
    </script>
</body>
</html>
