<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIONS-GOLD | PANEL DE TRADING GLOBAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=MedievalSharp&family=Inter:wght@400;700&display=swap');
        
        :root { 
            --gold: #c5a059; 
            --gold-glow: rgba(197, 160, 89, 0.4);
        }

        body { 
            background: #050505; 
            color: #e2e2e2; 
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.95)), url('https://p325k7wa.twic.pics/high/albion-online/albion-online/01-news/og-albion-online.jpg');
            background-attachment: fixed;
            background-size: cover;
        }

        .font-mythic { font-family: 'Cinzel Decorative', serif; }
        .font-medieval { font-family: 'MedievalSharp', cursive; }

        .glass-panel {
            background: rgba(15, 17, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .mythic-border {
            border: 2px solid;
            border-image: linear-gradient(to bottom, #c5a059, #4a3a1a) 1;
        }

        .city-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(197, 160, 89, 0.1);
            transition: 0.3s;
        }
        .city-card:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }

        .input-gold {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #3d3423;
            color: white;
            padding: 12px;
            outline: none;
            transition: 0.3s;
        }
        .input-gold:focus { border-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }

        .loader {
            border: 3px solid rgba(197, 160, 89, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--gold);
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-black/90 border-b border-[#c5a059]/30 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-chart-line text-[#c5a059] text-xl"></i>
                <span class="font-mythic text-[#c5a059] tracking-widest text-lg">CENTRAL DE INTELIGENCIA</span>
            </div>
            <a href="index.html" class="font-medieval text-gray-400 hover:text-white transition-colors flex items-center gap-2 text-sm">
                <i class="fa-solid fa-arrow-left"></i> VOLVER A LA TABERNA
            </a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        
        <section class="glass-panel mythic-border p-8 mb-10">
            <h1 class="font-mythic text-3xl text-center text-[#c5a059] mb-8">BUSCADOR DE MERCANCÍAS</h1>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="itemName" placeholder="Ej: T8_HEAD_PLATE_SET1 (Usa IDs de objeto)" class="input-gold flex-1 font-mono text-sm uppercase">
                <select id="quality" class="input-gold md:w-48 text-sm">
                    <option value="1">Calidad: Normal</option>
                    <option value="2">Calidad: Buena</option>
                    <option value="3">Calidad: Notable</option>
                    <option value="4">Calidad: Sobresaliente</option>
                    <option value="5">Calidad: Excelente</option>
                </select>
                <button onclick="fetchPrices()" class="bg-[#c5a059] text-black font-bold px-8 py-3 hover:brightness-110 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i> CONSULTAR
                </button>
            </div>
            <p class="text-[10px] text-gray-500 mt-4 uppercase tracking-widest">Nota: Debes usar el ID técnico (ej: T4_BAG) para resultados precisos.</p>
        </section>

        <div id="loading" class="flex justify-center mb-10 hidden">
            <div class="loader"></div>
        </div>

        <section id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 opacity-30">
                <i class="fa-solid fa-box-open text-6xl mb-4"></i>
                <p class="font-medieval text-xl">Ingresa un ID de objeto para comparar precios entre ciudades</p>
            </div>
        </section>

    </main>

    <footer class="text-center py-10 opacity-50 text-[10px] font-mythic">
        SMITH BUSINESS SOLUTIONS | DATOS PROVISTOS POR ALBION ONLINE DATA PROJECT
    </footer>

    <script>
        const CITIES = ["Caerleon", "Lymhurst", "Bridgewatch", "Martlock", "Thetford", "Fort Sterling", "Brecilien"];

        async function fetchPrices() {
            const item = document.getElementById('itemName').value.trim().toUpperCase();
            const quality = document.getElementById('quality').value;
            const grid = document.getElementById('resultsGrid');
            const loader = document.getElementById('loading');

            if (!item) return alert("Escribe un ID de objeto");

            loader.style.display = 'block';
            grid.innerHTML = '';

            try {
                // Endpoint de Albion Online Data Project
                const url = `https://west.albion-online-data.com/api/v2/stats/prices/${item}?locations=${CITIES.join(',')}&qualities=${quality}`;
                
                const response = await fetch(url);
                const data = await response.json();

                loader.style.display = 'none';

                if (!data || data.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center text-red-500 font-medieval">No se encontraron datos para este objeto. Verifica el ID.</div>`;
                    return;
                }

                // Ordenar por precio de venta mínimo (más barato primero)
                data.sort((a, b) => (a.sell_price_min || Infinity) - (b.sell_price_min || Infinity));

                data.forEach(stat => {
                    const priceMin = stat.sell_price_min ? stat.sell_price_min.toLocaleString() : "N/D";
                    const priceMax = stat.sell_price_max ? stat.sell_price_max.toLocaleString() : "N/D";
                    const lastUpdate = new Date(stat.sell_price_min_date).toLocaleTimeString();

                    const card = document.createElement('div');
                    card.className = 'city-card p-6 rounded-sm flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="font-mythic text-amber-500 text-lg">${stat.city}</h3>
                                <i class="fa-solid fa-location-dot text-amber-900"></i>
                            </div>
                            <div class="space-y-3 font-medieval">
                                <div class="flex justify-between border-b border-white/5 pb-2">
                                    <span class="text-gray-500 text-xs uppercase">Precio Mín</span>
                                    <span class="text-green-500 font-bold">${priceMin} <i class="fa-solid fa-coins text-[10px]"></i></span>
                                </div>
                                <div class="flex justify-between border-b border-white/5 pb-2">
                                    <span class="text-gray-500 text-xs uppercase">Precio Máx</span>
                                    <span class="text-amber-200">${priceMax} <i class="fa-solid fa-coins text-[10px]"></i></span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-6 flex justify-between items-center">
                            <span class="text-[9px] text-gray-600 uppercase">Actualizado: ${lastUpdate}</span>
                            <span class="text-[10px] bg-amber-900/30 text-amber-500 px-2 py-1">Q${stat.quality}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                loader.style.display = 'none';
                alert("Error al conectar con la base de datos de Albion.");
                console.error(error);
            }
        }
    </script>
</body>
</html>
