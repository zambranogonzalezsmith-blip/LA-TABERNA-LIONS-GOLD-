<section id="tab-radar" class="tab-content glass-panel p-8 mb-10 border-2 border-cyan-500/20">
    <div class="flex justify-between items-center mb-6">
        <div class="flex flex-col">
            <h1 class="font-mythic text-xl text-cyan-400 uppercase tracking-[0.3em]">Scanner de Prospección 🦅</h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">Identificación de Nodos de Alto Valor</p>
        </div>
        <div class="flex gap-2">
            <span class="bg-cyan-950/50 text-cyan-400 border border-cyan-500/30 px-3 py-1 rounded text-[10px] font-black animate-pulse">
                SATÉLITE ACTIVO
            </span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="space-y-4">
            <div class="flex flex-col gap-2">
                <label class="text-[10px] text-cyan-600 uppercase font-black tracking-widest">Bioma de Operación</label>
                <select id="radar-biome" class="input-gold border-cyan-900/50 text-sm" onchange="updateRadar()">
                    <option value="Steppe">Estepa (Bridgewatch) - Cueros</option>
                    <option value="Forest">Bosque (Lymhurst) - Madera</option>
                    <option value="Swamp">Pantano (Thetford) - Fibra</option>
                    <option value="Mountain">Montaña (Fort Sterling) - Mineral</option>
                    <option value="Highland">Tierras Altas (Martlock) - Piedra</option>
                </select>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-[10px] text-cyan-600 uppercase font-black tracking-widest">Riesgo de Zona</label>
                <div class="flex gap-1">
                    <button onclick="setRisk('Safe')" class="flex-1 py-2 text-[10px] font-bold bg-blue-900/20 border border-blue-500/30 text-blue-400 rounded-sm">ZONA AZUL/AM</button>
                    <button onclick="setRisk('Lethal')" class="flex-1 py-2 text-[10px] font-bold bg-red-900/20 border border-red-500/30 text-red-400 rounded-sm">ZONA ROJA/NEGRA</button>
                </div>
            </div>

            <div class="p-4 bg-black/40 border border-cyan-500/10 rounded-sm space-y-3">
                <h4 class="text-[10px] font-black text-cyan-500 uppercase">Objetivos Especiales</h4>
                <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-400">Presas Raras (.4)</span>
                    <i class="fa-solid fa-crosshairs text-cyan-500 animate-spin-slow"></i>
                </div>
                <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-400">Dungeons Estáticas</span>
                    <i class="fa-solid fa-door-open text-purple-500"></i>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 relative min-h-[300px] bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] border border-cyan-500/20 rounded flex items-center justify-center overflow-hidden">
            <div class="absolute w-[250px] h-[250px] border border-cyan-500/10 rounded-full"></div>
            <div class="absolute w-[150px] h-[150px] border border-cyan-500/10 rounded-full"></div>
            <div class="absolute w-[50px] h-[50px] border border-cyan-500/20 rounded-full bg-cyan-500/5"></div>
            
            <div class="absolute w-1/2 h-1 bg-gradient-to-r from-transparent to-cyan-500 origin-left animate-[spin_4s_linear_infinite]" style="top: 50%; left: 50%;"></div>

            <div id="radar-points" class="relative w-full h-full">
                </div>

            <div class="absolute bottom-4 left-4 bg-black/80 p-2 border border-cyan-500/30">
                <p id="radar-status" class="text-[9px] font-mono text-cyan-400 uppercase tracking-tighter">Escaneando coordenadas...</p>
            </div>
        </div>
    </div>
</section>

<style>
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    .radar-dot { position: absolute; transform: translate(-50%, -50%); border-radius: 50%; filter: blur(1px); }
</style>

<script>
    // Inyectar en tu función switchTab la lógica del Radar
    function updateRadar() {
        const pointsContainer = document.getElementById('radar-points');
        const biome = document.getElementById('radar-biome').value;
        const status = document.getElementById('radar-status');
        
        pointsContainer.innerHTML = '';
        status.innerText = `Calculando densidad de nodos en: ${biome.toUpperCase()}...`;

        // Generación de puntos simulados basados en lógica de juego
        for(let i=0; i<8; i++) {
            const dot = document.createElement('div');
            const type = Math.random() > 0.7 ? 'rare' : 'normal';
            const x = Math.random() * 80 + 10;
            const y = Math.random() * 80 + 10;
            
            dot.className = 'radar-dot shadow-lg';
            dot.style.left = `${x}%`;
            dot.style.top = `${y}%`;
            
            if(type === 'rare') {
                dot.style.width = '8px';
                dot.style.height = '8px';
                dot.style.background = '#facc15'; // Oro/Raro
                dot.style.boxShadow = '0 0 10px #facc15';
                dot.innerHTML = '<span class="absolute -top-4 -left-2 text-[7px] text-yellow-400 font-black">ENCHANTED .4</span>';
            } else {
                dot.style.width = '4px';
                dot.style.height = '4px';
                dot.style.background = '#22d3ee'; // Cyan/Normal
            }
            
            pointsContainer.appendChild(dot);
        }
    }

    // Inicializar radar al cargar pestaña
    // (Asegúrate de agregar 'radar' a tus botones de navegación)
</script>
