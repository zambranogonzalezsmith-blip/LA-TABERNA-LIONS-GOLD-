<!-- Dependencias Pro -->
<script src="https://tailwindcss.com"></script>
<link rel="stylesheet" href="https://cloudflare.com">
<link href="https://googleapis.com" rel="stylesheet">

<div id="lions-scanner-v2" class="max-w-6xl mx-auto p-4 font-['JetBrains_Mono']">
    <div class="glass-panel border-t-4 border-t-cyan-500 bg-slate-950/90 rounded-lg overflow-hidden shadow-2xl shadow-cyan-500/10">
        
        <!-- Header Táctico -->
        <div class="flex flex-wrap justify-between items-center p-6 border-b border-cyan-500/20 bg-cyan-950/20">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <i class="fa-solid fa-satellite-dish text-3xl text-cyan-400 animate-pulse"></i>
                    <span class="absolute -top-1 -right-1 flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-cyan-500"></span>
                    </span>
                </div>
                <div>
                    <h2 class="text-2xl font-black text-cyan-400 tracking-tighter uppercase italic">LIONS-GOLD <span class="text-white">Tactical Scanner</span></h2>
                    <p class="text-[10px] text-cyan-700 font-bold uppercase tracking-widest">Protocolo de Prospección Avanzada v2.4</p>
                </div>
            </div>
            
            <div class="flex gap-4 mt-4 sm:mt-0">
                <div class="text-right border-l border-cyan-500/30 pl-4">
                    <p class="text-[9px] text-gray-500 uppercase">Carga de Red</p>
                    <p class="text-sm font-bold text-cyan-400">98.2% STABLE</p>
                </div>
                <div class="text-right border-l border-cyan-500/30 pl-4">
                    <p class="text-[9px] text-gray-500 uppercase">Timestamp</p>
                    <p id="clock" class="text-sm font-bold text-white">00:00:00</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-4">
            
            <!-- Panel Lateral Izquierdo: Configuración -->
            <div class="p-6 border-r border-cyan-500/10 space-y-6 bg-black/20">
                <div>
                    <label class="block text-[10px] font-black text-cyan-500 mb-3 uppercase tracking-widest">Entorno de Despliegue</label>
                    <select id="biome-select" onchange="runDeepScan()" class="w-full bg-slate-900 border border-cyan-500/30 text-cyan-100 p-3 rounded text-xs focus:ring-2 focus:ring-cyan-500/50 outline-none transition-all">
                        <option value="Steppe">Bridgewatch (Estepa)</option>
                        <option value="Forest">Lymhurst (Bosque)</option>
                        <option value="Swamp">Thetford (Pantano)</option>
                        <option value="Mountain">Fort Sterling (Montaña)</option>
                        <option value="Highland">Martlock (Tierras Altas)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-cyan-500 mb-3 uppercase tracking-widest">Protocolo de Riesgo</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setRiskLevel('Safe', this)" class="risk-btn active-safe border border-cyan-500/50 p-2 text-[10px] font-bold rounded bg-cyan-500/10 text-cyan-400 hover:bg-cyan-500/20 transition-all">ESTÁNDAR</button>
                        <button onclick="setRiskLevel('Lethal', this)" class="risk-btn border border-red-500/20 p-2 text-[10px] font-bold rounded text-red-700 hover:bg-red-500/10 transition-all">PELIGRO MÁXIMO</button>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center p-3 bg-cyan-950/30 border border-cyan-500/10 rounded">
                        <span class="text-[10px] text-gray-400">PROBABILIDAD .4</span>
                        <span id="stat-4" class="text-xs font-bold text-cyan-400">12%</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-cyan-950/30 border border-cyan-500/10 rounded">
                        <span class="text-[10px] text-gray-400">ÍNDICE DE LUCRO</span>
                        <span id="stat-profit" class="text-xs font-bold text-green-400">MEDIO</span>
                    </div>
                </div>

                <button onclick="runDeepScan()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-black font-black text-xs uppercase tracking-widest rounded shadow-[0_0_15px_rgba(8,145,178,0.4)] transition-all active:scale-95">
                    Reiniciar Scanner
                </button>
            </div>

            <!-- Panel Central: El Radar -->
            <div class="xl:col-span-2 p-6 flex flex-col items-center justify-center relative bg-black/40 min-h-[450px]">
                <!-- Efecto Scanlines -->
                <div class="pointer-events-none absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] z-10 bg-[length:100%_2px,3px_100%]"></div>
                
                <div class="relative w-[300px] h-[300px] md:w-[400px] md:h-[400px]">
                    <!-- Círculos de Radar -->
                    <div class="absolute inset-0 border border-cyan-500/20 rounded-full"></div>
                    <div class="absolute inset-10 border border-cyan-500/10 rounded-full"></div>
                    <div class="absolute inset-24 border border-cyan-500/10 rounded-full"></div>
                    <div class="absolute inset-40 border border-cyan-500/30 rounded-full bg-cyan-500/5"></div>
                    
                    <!-- Ejes -->
                    <div class="absolute top-1/2 left-0 w-full h-[1px] bg-cyan-500/20"></div>
                    <div class="absolute left-1/2 top-0 w-[1px] h-full bg-cyan-500/20"></div>

                    <!-- Barrido -->
                    <div class="absolute top-1/2 left-1/2 w-1/2 h-1 bg-gradient-to-r from-transparent to-cyan-500 origin-left animate-sweep"></div>

                    <!-- Contenedor de Puntos -->
                    <div id="radar-screen" class="absolute inset-0 overflow-hidden"></div>
                </div>

                <div class="mt-8 w-full max-w-md">
                    <div class="flex justify-between mb-1">
                        <span class="text-[9px] text-cyan-500 font-bold uppercase">Procesando señales térmicas</span>
                        <span class="text-[9px] text-cyan-500 font-bold" id="progress-text">100%</span>
                    </div>
                    <div class="w-full bg-cyan-950 h-1 rounded-full overflow-hidden border border-cyan-500/20">
                        <div id="progress-bar" class="bg-cyan-500 h-full w-full transition-all duration-500"></div>
                    </div>
                </div>
            </div>

            <!-- Panel Lateral Derecho: Log de Nodos -->
            <div class="p-6 border-l border-cyan-500/10 bg-black/20 flex flex-col">
                <h4 class="text-[10px] font-black text-cyan-500 mb-4 uppercase tracking-[0.2em]">Registro de Detección</h4>
                <div id="detection-log" class="space-y-2 overflow-y-auto max-h-[350px] pr-2 custom-scrollbar text-[10px]">
                    <!-- Se llena vía JS -->
                </div>
                <div class="mt-auto pt-4 border-t border-cyan-500/10 italic text-[9px] text-gray-600">
                    * Datos aproximados basados en el último parche de Albion.
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    .glass-panel { backdrop-filter: blur(10px); }
    @keyframes sweep { 
        from { transform: rotate(0deg); shadow: 0 0 10px blue; } 
        to { transform: rotate(360deg); } 
    }
    .animate-sweep { animation: sweep 3s linear infinite; }
    
    .active-safe { background: rgba(6, 182, 212, 0.2) !important; color: #22d3ee !important; border-color: #22d3ee !important; }
    .active-lethal { background: rgba(239, 68, 68, 0.2) !important; color: #ef4444 !important; border-color: #ef4444 !important; }

    .node-flash { animation: flash 1s infinite alternate; }
    @keyframes flash { from { opacity: 0.3; } to { opacity: 1; } }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #0891b2; border-radius: 10px; }
</style>

<script>
    let risk = 'Safe';
    const logContainer = document.getElementById('detection-log');
    const screen = document.getElementById('radar-screen');

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);

    function setRiskLevel(level, btn) {
        risk = level;
        document.querySelectorAll('.risk-btn').forEach(b => {
            b.classList.remove('active-safe', 'active-lethal');
            b.style.borderColor = 'rgba(6, 182, 212, 0.1)';
        });
        
        btn.classList.add(level === 'Safe' ? 'active-safe' : 'active-lethal');
        runDeepScan();
    }

    function addLogEntry(name, quality) {
        const entry = document.createElement('div');
        entry.className = `p-2 border-l-2 bg-white/5 flex justify-between items-center transition-all animate-fade-in ${quality === 'RARE' ? 'border-yellow-500' : 'border-cyan-500'}`;
        entry.innerHTML = `
            <div>
                <span class="block font-bold ${quality === 'RARE' ? 'text-yellow-400' : 'text-cyan-400'}">${name}</span>
                <span class="text-gray-500 uppercase text-[8px]">Coordenadas: ${Math.floor(Math.random()*900)},${Math.floor(Math.random()*900)}</span>
            </div>
            <span class="text-[9px] font-black">${quality}</span>
        `;
        logContainer.prepend(entry);
        if(logContainer.children.length > 8) logContainer.lastChild.remove();
    }

    function runDeepScan() {
        // Reiniciar visuales
        screen.innerHTML = '';
        logContainer.innerHTML = '';
        
        const progressBar = document.getElementById('progress-bar');
        const progText = document.getElementById('progress-text');
        const profitStat = document.getElementById('stat-profit');
        const rareStat = document.getElementById('stat-4');
        
        let p = 0;
        progressBar.style.width = '0%';
        
        const interval = setInterval(() => {
            p += 5;
            progressBar.style.width = p + '%';
            progText.innerText = p + '%';
            
            if(p >= 100) {
                clearInterval(interval);
                generateNodes();
            }
        }, 30);

        // Actualizar estadísticas ficticias
        if(risk === 'Lethal') {
            profitStat.innerText = 'EXTREMO';
            profitStat.className = 'text-xs font-bold text-red-500';
            rareStat.innerText = '35%';
        } else {
            profitStat.innerText = 'ESTÁNDAR';
            profitStat.className = 'text-xs font-bold text-green-400';
            rareStat.innerText = '12%';
        }
    }

    function generateNodes() {
        const biome = document.getElementById('biome-select').value;
        const count = risk === 'Lethal' ? 12 : 6;
        
        const resources = {
            'Steppe': 'Cueros',
            'Forest': 'Madera',
            'Swamp': 'Fibra',
            'Mountain': 'Mineral',
            'Highland': 'Piedra'
        };

        for(let i=0; i<count; i++) {
            const isRare = Math.random() > (risk === 'Lethal' ? 0.6 : 0.85);
            const x = Math.random() * 80 + 10;
            const y = Math.random() * 80 + 10;
            
            // Crear Punto en Radar
            const dot = document.createElement('div');
            dot.style.left = `${x}%`;
            dot.style.top = `${y}%`;
            dot.className = `absolute w-2 h-2 rounded-full transform -translate-x-1/2 -translate-y-1/2 ${isRare ? 'bg-yellow-400 shadow-[0_0_10px_#facc15] node-flash' : 'bg-cyan-500 shadow-[0_0_5px_#06b6d4]'}`;
            
            screen.appendChild(dot);
            
            // Agregar al Log
            const nodeName = isRare ? `${resources[biome]} Encantado .4` : `${resources[biome]} T6/T7`;
            addLogEntry(nodeName, isRare ? 'RARE' : 'NORMAL');
        }
    }

    // Inicializar
    runDeepScan();
</script>
