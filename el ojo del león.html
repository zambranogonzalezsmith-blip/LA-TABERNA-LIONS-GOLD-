<!-- Cargar Dependencias si no las tienes en tu index -->
<script src="https://tailwindcss.com"></script>
<link rel="stylesheet" href="https://cloudflare.com">

<section id="tab-radar" class="tab-content glass-panel p-8 mb-10 border-2 border-cyan-500/20 bg-slate-900 text-white rounded-xl">
    <div class="flex justify-between items-center mb-6">
        <div class="flex flex-col">
            <h1 class="font-mythic text-xl text-cyan-400 uppercase tracking-[0.3em]">Scanner de Prospección 🦅</h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">Identificación de Nodos de Alto Valor</p>
        </div>
        <div class="flex gap-2">
            <span class="bg-cyan-950/50 text-cyan-400 border border-cyan-500/30 px-3 py-1 rounded text-[10px] font-black animate-pulse">
                SATÉLITE ACTIVO
            </span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="space-y-4">
            <!-- Bioma -->
            <div class="flex flex-col gap-2">
                <label class="text-[10px] text-cyan-600 uppercase font-black tracking-widest">Bioma de Operación</label>
                <select id="radar-biome" class="bg-black/50 border border-cyan-900/50 text-cyan-100 p-2 rounded text-sm focus:outline-none focus:border-cyan-500" onchange="updateRadar()">
                    <option value="Steppe">Estepa (Bridgewatch) - Cueros</option>
                    <option value="Forest">Bosque (Lymhurst) - Madera</option>
                    <option value="Swamp">Pantano (Thetford) - Fibra</option>
                    <option value="Mountain">Montaña (Fort Sterling) - Mineral</option>
                    <option value="Highland">Tierras Altas (Martlock) - Piedra</option>
                </select>
            </div>

            <!-- Riesgo -->
            <div class="flex flex-col gap-2">
                <label class="text-[10px] text-cyan-600 uppercase font-black tracking-widest">Riesgo de Zona</label>
                <div class="flex gap-1">
                    <button id="btn-risk-safe" onclick="setRisk('Safe')" class="risk-btn flex-1 py-2 text-[10px] font-bold bg-blue-900/20 border border-blue-500/30 text-blue-400 rounded-sm transition-all">ZONA AZUL/AM</button>
                    <button id="btn-risk-lethal" onclick="setRisk('Lethal')" class="risk-btn flex-1 py-2 text-[10px] font-bold bg-red-900/20 border border-red-500/30 text-red-400 rounded-sm transition-all opacity-50">ZONA ROJA/NEGRA</button>
                </div>
            </div>

            <!-- Objetivos -->
            <div class="p-4 bg-black/40 border border-cyan-500/10 rounded-sm space-y-3">
                <h4 class="text-[10px] font-black text-cyan-500 uppercase">Objetivos Especiales</h4>
                <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-400">Presas Raras (.4)</span>
                    <i class="fa-solid fa-crosshairs text-cyan-500 animate-spin-slow"></i>
                </div>
                <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-400">Dungeons Estáticas</span>
                    <i class="fa-solid fa-door-open text-purple-500"></i>
                </div>
            </div>
        </div>

        <!-- Pantalla de Radar -->
        <div class="lg:col-span-2 relative min-h-[300px] bg-black/60 border border-cyan-500/20 rounded flex items-center justify-center overflow-hidden">
            <!-- Capas de Radar (Círculos) -->
            <div class="absolute w-[250px] h-[250px] border border-cyan-500/10 rounded-full"></div>
            <div class="absolute w-[150px] h-[150px] border border-cyan-500/10 rounded-full"></div>
            <div class="absolute w-[50px] h-[50px] border border-cyan-500/20 rounded-full bg-cyan-500/5"></div>
            
            <!-- Barrido de Radar -->
            <div class="absolute w-1/2 h-1 bg-gradient-to-r from-transparent to-cyan-500 origin-left animate-radar-sweep" style="top: 50%; left: 50%;"></div>

            <!-- Contenedor de Puntos -->
            <div id="radar-points" class="absolute inset-0"></div>

            <div class="absolute bottom-4 left-4 bg-black/80 p-2 border border-cyan-500/30">
                <p id="radar-status" class="text-[9px] font-mono text-cyan-400 uppercase tracking-tighter italic">Iniciando sistemas...</p>
            </div>
        </div>
    </div>
</section>

<style>
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes radar-sweep { 
        from { transform: rotate(0deg); } 
        to { transform: rotate(360deg); } 
    }
    
    .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    .animate-radar-sweep { animation: radar-sweep 4s linear infinite; }
    
    .radar-dot { 
        position: absolute; 
        transform: translate(-50%, -50%); 
        border-radius: 50%; 
        transition: all 0.5s ease-in-out;
    }

    .glass-panel {
        backdrop-filter: blur(12px);
        background: rgba(15, 23, 42, 0.8);
    }
</style>

<script>
    let currentRisk = 'Safe';

    function setRisk(level) {
        currentRisk = level;
        const btnSafe = document.getElementById('btn-risk-safe');
        const btnLethal = document.getElementById('btn-risk-lethal');

        if(level === 'Safe') {
            btnSafe.classList.remove('opacity-50');
            btnLethal.classList.add('opacity-50');
        } else {
            btnLethal.classList.remove('opacity-50');
            btnSafe.classList.add('opacity-50');
        }
        updateRadar();
    }

    function updateRadar() {
        const pointsContainer = document.getElementById('radar-points');
        const biome = document.getElementById('radar-biome').value;
        const status = document.getElementById('radar-status');
        
        // Limpiar puntos actuales
        pointsContainer.innerHTML = '';
        status.innerText = `[OK] ESCANEANDO ${biome.toUpperCase()} - RIESGO: ${currentRisk.toUpperCase()}`;

        // Densidad según riesgo (más puntos en zonas letales)
        const density = currentRisk === 'Lethal' ? 12 : 6;

        for(let i=0; i < density; i++) {
            const dot = document.createElement('div');
            const isRare = Math.random() > 0.8;
            
            // Coordenadas aleatorias dentro del círculo (manteniendo margen)
            const x = Math.random() * 70 + 15;
            const y = Math.random() * 70 + 15;
            
            dot.className = 'radar-dot shadow-lg';
            dot.style.left = `${x}%`;
            dot.style.top = `${y}%`;
            
            if(isRare) {
                dot.style.width = '10px';
                dot.style.height = '10px';
                dot.style.background = '#facc15';
                dot.style.boxShadow = '0 0 15px #facc15';
                dot.innerHTML = '<span class="absolute -top-5 -left-4 text-[7px] text-yellow-400 font-black whitespace-nowrap">NODE .4 DETECTED</span>';
            } else {
                dot.style.width = '5px';
                dot.style.height = '5px';
                dot.style.background = '#22d3ee';
                dot.style.boxShadow = '0 0 8px #22d3ee';
            }
            
            // Retraso de aparición para efecto visual
            setTimeout(() => {
                pointsContainer.appendChild(dot);
            }, i * 150);
        }
    }

    // Auto-ejecución al cargar
    document.addEventListener('DOMContentLoaded', updateRadar);
</script>
