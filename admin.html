<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIONS-GOLD | Centro de Comando</title>
    <style>
        :root {
            --gold: #f59e0b;
            --bg: #0b1120;
            --panel: rgba(30, 41, 59, 0.7);
        }
        body { 
            background-color: var(--bg); 
            color: #e2e8f0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            border-bottom: 2px solid var(--gold);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .panel { 
            background: var(--panel); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0f172a; color: var(--gold); text-transform: uppercase; font-size: 0.8rem; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .status-active { color: #00ff00; font-weight: bold; }
        .status-blacklisted { color: #ff4444; font-weight: bold; background: rgba(255, 68, 68, 0.1); padding: 2px 6px; border-radius: 4px; }
        
        button { 
            padding: 6px 12px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            border: none;
            transition: 0.3s;
            margin-right: 5px;
        }
        .btn-up { background: #064e3b; color: #34d399; border: 1px solid #34d399; }
        .btn-up:hover { background: #34d399; color: #064e3b; }
        .btn-ban { background: #7f1d1d; color: #fecaca; border: 1px solid #fecaca; }
        .btn-ban:hover { background: #fecaca; color: #7f1d1d; }
        .btn-auth { background: var(--gold); color: black; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Panel de Control de Personal: LIONS-GOLD</h1>
    </header>
    <main>
        <button class="btn-auth" onclick="setAuthToken()">🔑 Validar Rango</button>
        
        <section class="panel">
            <h2>Censo de Usuarios y Reputación</h2>
            <table id="user-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Jugador (IGN)</th>
                        <th>Reputación</th>
                        <th>Estado</th>
                        <th>Acciones Tácticas</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    </tbody>
            </table>
        </section>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api/admin';
        let adminToken = localStorage.getItem('lg_admin_token') || "";

        function setAuthToken() {
            const token = prompt("Ingrese CLAVE DE MANDO CENTRAL:");
            if (token) {
                adminToken = token;
                localStorage.setItem('lg_admin_token', token);
                loadUsers();
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API_URL}/users`, {
                    headers: { 'x-admin-token': adminToken }
                });

                if (res.status === 401) {
                    alert("Acceso Denegado. Token inválido.");
                    return;
                }

                const users = await res.json();
                const list = document.getElementById('user-list');
                list.innerHTML = users.map(u => `
                    <tr>
                        <td>${u.id}</td>
                        <td><strong>${u.username}</strong></td>
                        <td>${u.reputation} ⭐</td>
                        <td><span class="status-${u.status}">${u.status.toUpperCase()}</span></td>
                        <td>
                            <button class="btn-up" onclick="changeRep('${u.username}', 10)">+10 Rep</button>
                            <button class="btn-ban" onclick="banUser('${u.username}')">BANEAR</button>
                            ${u.status === 'blacklisted' ? `<button onclick="activateUser('${u.username}')">PERDONAR</button>` : ''}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Error cargando usuarios:", err);
            }
        }

        async function banUser(username) {
            if(!confirm(`¿Confirmas el baneo definitivo de ${username}?`)) return;
            await fetch(`${API_URL}/update-status`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-token': adminToken
                },
                body: JSON.stringify({ username, newStatus: 'blacklisted', reason: 'Fraude detectado' })
            });
            loadUsers();
        }

        async function changeRep(username, points) {
            await fetch(`${API_URL}/reputation`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-token': adminToken
                },
                body: JSON.stringify({ username, points })
            });
            loadUsers();
        }

        async function activateUser(username) {
            await fetch(`${API_URL}/update-status`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-token': adminToken
                },
                body: JSON.stringify({ username, newStatus: 'active' })
            });
            loadUsers();
        }

        window.onload = () => {
            if (adminToken) loadUsers();
            else alert("Por favor, valide su rango para acceder a los datos.");
        };
    </script>
</body>
</html>
