<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIONS-GOLD | TABERNA DE COMERCIO MÍTICO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=MedievalSharp&family=Inter:wght@400;700&display=swap');
        
        :root { 
            --gold: #c5a059; 
            --gold-glow: rgba(197, 160, 89, 0.6);
        }

        body { 
            background: #030303; 
            color: #e2e2e2; 
            font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, #030303 100%), url('https://p325k7wa.twic.pics/high/albion-online/albion-online/01-news/og-albion-online.jpg'); 
            background-attachment: fixed; 
            background-size: cover; 
            background-position: center;
            min-height: 100vh;
        }

        .font-mythic { font-family: 'Cinzel Decorative', serif; }
        .font-medieval { font-family: 'MedievalSharp', cursive; }
        
        .mythic-border {
            border: 2px solid;
            border-image: linear-gradient(to bottom, #c5a059, #4a3a1a, #c5a059) 1;
            box-shadow: 0 0 25px rgba(0,0,0,0.9), inset 0 0 30px rgba(197, 160, 89, 0.1);
        }

        .tavern-panel { 
            background: linear-gradient(180deg, rgba(13, 15, 18, 0.98) 0%, rgba(5, 5, 5, 0.98) 100%); 
            backdrop-filter: blur(12px); 
        }

        .input-mythic { 
            background: rgba(20, 22, 25, 0.9); 
            border: 1px solid #3d3423; 
            color: #fff; 
            padding: 14px; 
            transition: 0.3s;
            border-radius: 4px;
        }
        .input-mythic:focus { border-color: var(--gold); box-shadow: 0 0 15px var(--gold-glow); outline: none; }

        .btn-action { 
            transition: 0.4s; 
            text-transform: uppercase; 
            font-weight: 900; 
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-venta { background: linear-gradient(135deg, #450a0a 0%, #b91c1c 100%); border: 1px solid #ef4444; color: #fee2e2; }
        .btn-compra { background: linear-gradient(135deg, #064e3b 0%, #059669 100%); border: 1px solid #10b981; color: #d1fae5; }
        .btn-action:hover { transform: scale(1.02); filter: brightness(1.2); cursor: pointer; }
        .btn-action:disabled { filter: grayscale(1); cursor: not-allowed; opacity: 0.6; }

        .h-trap { position: absolute; left: -9999px; opacity: 0; }
    </style>
</head>
<body>

    <nav class="bg-black/95 border-b-2 border-[#c5a059]/40 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 mythic-border flex items-center justify-center bg-black">
                    <i class="fa-solid fa-crown text-[#c5a059] text-xl"></i>
                </div>
                <span class="font-mythic text-[#c5a059] text-xl tracking-widest uppercase">LIONS-GOLD</span>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto mt-16 px-6">
        <div class="tavern-panel mythic-border p-8 relative">
            <h2 class="font-mythic text-amber-500 text-3xl mb-8 border-b border-amber-900/50 pb-4 text-center">FORJAR CONTRATO</h2>
            
            <div class="space-y-6 font-medieval">
                <input type="text" id="guild_trap" class="h-trap" tabindex="-1" autocomplete="off">

                <div class="flex flex-col gap-2">
                    <label class="text-xs text-amber-700 uppercase">Mercader Identificado</label>
                    <input type="text" id="trader" placeholder="NOMBRE DEL JUGADOR" class="input-mythic w-full uppercase">
                </div>
                
                <div class="flex flex-col gap-2">
                    <label class="text-xs text-amber-700 uppercase">Cargamento</label>
                    <input type="text" id="item" placeholder="EJ: MAMUT DE TRANSPORTE" class="input-mythic w-full">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs text-amber-700 uppercase">Monto en Plata</label>
                    <input type="number" id="price" placeholder="0" class="input-mythic w-full text-amber-500 font-bold">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <select id="start" class="input-mythic w-full text-sm">
                        <option value="Lymhurst">Lymhurst</option>
                        <option value="Caerleon">Caerleon</option>
                        <option value="Bridgewatch">Bridgewatch</option>
                        <option value="Martlock">Martlock</option>
                        <option value="Thetford">Thetford</option>
                        <option value="Fort Sterling">Fort Sterling</option>
                    </select>
                    <select id="end" class="input-mythic w-full text-sm">
                        <option value="Caerleon">Caerleon</option>
                        <option value="Lymhurst">Lymhurst</option>
                        <option value="Isla de Gremio">Isla de Gremio</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-6 pt-6">
                    <button onclick="scarfaceVerify('VENTA')" id="btnVenta" class="btn-action btn-venta py-5 rounded-sm">Vender</button>
                    <button onclick="scarfaceVerify('COMPRA')" id="btnCompra" class="btn-action btn-compra py-5 rounded-sm">Comprar</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Webhook ofuscado (MTQ5NTE...)
        const _encT = "MTQ5NTE1MDE3NDI0NTIyODY1NS81R2lmRk1IY2g1bGhYWWlRTERTcTZTREN5eTdybUZpOHpEVnNSRG02S1V6ZjkyWTVqVXlFV25fNjRDbGjiaGoyXy1xUg==";
        const HQ_SECURE_LINK = "https://discord.com/api/webhooks/" + atob(_encT);

        async function scarfaceVerify(tipo) {
            if (document.getElementById('guild_trap').value !== "") return;

            const name = document.getElementById('trader').value.trim();
            const item = document.getElementById('item').value.trim();
            const price = document.getElementById('price').value;

            if (!name || !item || !price) {
                alert("⚠️ Datos incompletos.");
                return;
            }

            const btnV = document.getElementById('btnVenta');
            const btnC = document.getElementById('btnCompra');
            const originalV = btnV.innerHTML;
            const originalC = btnC.innerHTML;

            btnV.disabled = true; btnC.disabled = true;
            if(tipo === 'VENTA') btnV.innerHTML = "<i class='fa-solid fa-spinner animate-spin'></i>";
            else btnC.innerHTML = "<i class='fa-solid fa-spinner animate-spin'></i>";

            try {
                // VERIFICACIÓN OBLIGATORIA
                const proxy = "https://api.allorigins.win/get?url=";
                const api = `https://gameinfo.albiononline.com/api/gameinfo/search?q=${encodeURIComponent(name)}`;
                
                const res = await fetch(proxy + encodeURIComponent(api));
                const data = await res.json();
                const parsed = JSON.parse(data.contents);
                const player = parsed.players && parsed.players.find(p => p.Name.toLowerCase() === name.toLowerCase());

                if (!player) {
                    alert("❌ JUGADOR NO ENCONTRADO. El contrato ha sido rechazado por el Sistema Scarface.");
                } else {
                    // SI EXISTE, ENVIAR
                    await fetch(HQ_SECURE_LINK, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: "CAPITÁN SCARFACE",
                            avatar_url: "https://i.imgur.com/8n06IUp.png",
                            embeds: [{
                                title: `📜 CONTRATO VERIFICADO: ${tipo}`,
                                color: 3066993,
                                description: `✅ **ID CONFIRMADA:** ${player.Name}\n**GREMIO:** ${player.GuildName || 'Sin Gremio'}`,
                                fields: [
                                    { name: "👤 Mercader", value: name.toUpperCase(), inline: true },
                                    { name: "📦 Mercancía", value: item, inline: true },
                                    { name: "💰 Plata", value: parseInt(price).toLocaleString(), inline: true },
                                    { name: "🚩 Ruta", value: `${document.getElementById('start').value} ➔ ${document.getElementById('end').value}` }
                                ],
                                footer: { text: "LIONS-GOLD SECURITY" },
                                timestamp: new Date().toISOString()
                            }]
                        })
                    });
                    alert("⚔️ Contrato sellado y enviado.");
                    document.getElementById('trader').value = '';
                    document.getElementById('item').value = '';
                    document.getElementById('price').value = '';
                }

            } catch (err) {
                alert("❌ Error de red con Albion. Intenta de nuevo.");
            } finally {
                btnV.disabled = false; btnC.disabled = false;
                btnV.innerHTML = originalV;
                btnC.innerHTML = originalC;
            }
        }
    </script>
</body>
</html>
