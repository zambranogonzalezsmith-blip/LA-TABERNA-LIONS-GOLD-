<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA TABERNA LIONS-GOLD | Mercado P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Metamorphous&display=swap');

        :root {
            --albion-gold: #f59e0b;
            --albion-dark: #0f172a;
            --albion-border: #42301c;
        }

        body { 
            background-color: #020617; 
            background-image: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            color: #e2e8f0; 
            font-family: 'Segoe UI', sans-serif; 
        }

        h1, h2, h3, .font-albion { font-family: 'Cinzel', serif; }

        .gold-text { color: var(--albion-gold); text-shadow: 0 0 8px rgba(245, 158, 11, 0.3); }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(12px); 
            border: 2px solid var(--albion-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Estética de Pergamino o Piedra */
        .glass-panel::before {
            content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border: 1px solid rgba(245, 158, 11, 0.2); pointer-events: none; border-radius: inherit;
        }

        .btn-gold { 
            background: linear-gradient(135deg, #78350f 0%, #b45309 50%, #f59e0b 100%); 
            color: white; 
            border: 1px solid #451a03;
            text-shadow: 1px 1px 2px black;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-gold:hover { 
            filter: brightness(1.2);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
        }

        .input-albion {
            background: #020617 !important;
            border: 1px solid var(--albion-border) !important;
            color: #f8fafc !important;
            transition: border 0.3s;
        }

        .input-albion:focus { border-color: var(--albion-gold) !important; ring: 1px solid var(--albion-gold); }

        .tab-active { 
            color: var(--albion-gold); 
            border-bottom: 3px solid var(--albion-gold);
            font-weight: 900;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-slate-950 border-b-2 border-[#42301c] sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-shield-cat text-3xl gold-text"></i>
                    <span class="font-albion font-black text-xl tracking-widest uppercase gold-text">LIONS-GOLD <span class="text-[10px] bg-amber-600 text-black px-1 rounded ml-1 font-sans">MERCATUS</span></span>
                </div>
                <div class="flex items-center space-x-6 text-xs uppercase font-bold tracking-widest">
                    <button onclick="switchTab('market')" id="btn-market" class="px-2 py-5 tab-active">Mercado</button>
                    <button onclick="switchTab('admin')" id="btn-admin" class="px-2 py-5 text-slate-400 hover:text-amber-500">Comando</button>
                    <button onclick="switchTab('rules')" id="btn-rules" class="px-2 py-5 text-slate-400 hover:text-amber-500">Leyes</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow p-4 md:p-8">
        
        <div id="view-market" class="max-w-5xl mx-auto space-y-6">
            <div class="glass-panel p-8 rounded-lg text-center border-double border-4">
                <h1 class="text-4xl md:text-6xl font-black mb-2 gold-text uppercase italic">Mercatus Uniti</h1>
                <p class="text-slate-400 text-sm italic font-serif">"Por la gloria del gremio, por el peso del silver."</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 glass-panel p-6 rounded-xl">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2 border-b border-slate-700 pb-2 gold-text">
                        <i class="fa-solid fa-scroll"></i> Emitir Orden de Venta
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div class="space-y-1">
                            <label class="text-[10px] text-amber-500 uppercase font-black">Vendedor (IGN)</label>
                            <input type="text" id="sellerName" placeholder="Nombre en Albion" class="w-full input-albion rounded-lg p-3 text-sm outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] text-amber-500 uppercase font-black">Ítem / Recurso</label>
                            <input type="text" id="itemName" placeholder="Ej: 10M Silver, Set T8.3..." class="w-full input-albion rounded-lg p-3 text-sm outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div class="space-y-1">
                            <label class="text-[10px] text-amber-500 uppercase font-black">Cantidad Bruta</label>
                            <input type="number" id="amount" oninput="calculatePreview()" placeholder="0.00" class="w-full input-albion rounded-lg p-3 text-sm outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] text-amber-500 uppercase font-black">Lugar de Entrega</label>
                            <select id="location" class="w-full input-albion rounded-lg p-3 text-sm outline-none">
                                <option value="Martlock">Martlock</option>
                                <option value="Bridgewatch">Bridgewatch</option>
                                <option value="Lymhurst">Lymhurst</option>
                                <option value="Fort Sterling">Fort Sterling</option>
                                <option value="Thetford">Thetford</option>
                                <option value="Caerleon">Caerleon</option>
                                <option value="Isla LIONS-GOLD">Isla LIONS-GOLD</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-1 mb-4">
                        <label class="text-[10px] text-amber-500 uppercase font-black">Descripción / Términos del Vendedor</label>
                        <textarea id="description" rows="2" placeholder="Escribe aquí si necesitas que el pago sea por una red específica..." class="w-full input-albion rounded-lg p-3 text-sm outline-none"></textarea>
                    </div>

                    <div class="bg-black/50 p-4 rounded border border-amber-900/30 mb-6">
                        <div class="flex justify-between text-[10px] uppercase font-bold mb-1">
                            <span class="text-slate-500">Impuesto de Guerra (0.06%):</span>
                            <span class="gold-text font-mono" id="previewFee">0.00</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-black uppercase text-slate-300">Neto a Recibir:</span>
                            <span class="text-2xl text-green-500 font-mono font-black" id="previewNet">0.00</span>
                        </div>
                    </div>

                    <div class="bg-red-900/10 border border-red-900/50 p-4 rounded-lg mb-6">
                        <div class="flex items-start gap-3">
                            <input type="checkbox" id="acceptTerms" class="mt-1 w-4 h-4 accent-amber-500 cursor-pointer">
                            <label for="acceptTerms" class="text-[10px] text-slate-400 italic leading-tight">
                                Al marcar esto, juro por mi honor en LIONS-GOLD que la mercancía es legítima. Acepto que cualquier intento de estafa implica baneo de IP, reporte en Discord Global y confiscación de activos.
                            </label>
                        </div>
                    </div>

                    <button onclick="createTrade()" class="w-full btn-gold py-4 rounded shadow-2xl flex items-center justify-center gap-3 text-sm tracking-[0.2em] uppercase font-black">
                        <i class="fa-solid fa-gavel"></i> Sellar Contrato P2P
                    </button>
                </div>

                <div class="space-y-6">
                    <div class="glass-panel p-6 rounded-xl border-dashed border-2">
                        <h4 class="gold-text font-albion font-bold text-center mb-4">ESTADO DE RED</h4>
                        <div class="space-y-4">
                            <div class="flex justify-between text-xs">
                                <span class="text-slate-400">Servidor:</span>
                                <span class="text-green-500 font-bold">OPERATIVO</span>
                            </div>
                            <div class="flex justify-between text-xs">
                                <span class="text-slate-400">Protección:</span>
                                <span class="text-blue-400 font-bold">ANTI-FRAUDE ACTIVADO</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-admin" class="max-w-5xl mx-auto hidden space-y-6">
            <div class="glass-panel p-6 rounded-2xl">
                <h3 class="text-xl font-black gold-text uppercase mb-6"><i class="fa-solid fa-eye"></i> Centro de Inteligencia</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-950 text-amber-500 uppercase text-[10px] tracking-widest border-b border-amber-900">
                            <tr>
                                <th class="p-4">Jugador</th>
                                <th class="p-4">Reputación</th>
                                <th class="p-4">Estatus</th>
                                <th class="p-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="adminUserTable" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let adminToken = "";

        function calculatePreview() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const fee = amount * 0.0006;
            document.getElementById('previewFee').innerText = fee.toFixed(2);
            document.getElementById('previewNet').innerText = (amount - fee).toFixed(2);
        }

        async function createTrade() {
            const accepted = document.getElementById('acceptTerms').checked;
            if(!accepted) return alert("⚠️ DEBES ACEPTAR LOS TÉRMINOS PARA PROCEDER.");

            const data = {
                seller: document.getElementById('sellerName').value,
                item: document.getElementById('itemName').value,
                amount: document.getElementById('amount').value,
                location: document.getElementById('location').value,
                description: document.getElementById('description').value
            };

            if(!data.seller || !data.item || !data.amount) return alert("Campos obligatorios vacíos.");

            try {
                const res = await fetch(`${API_BASE}/trades`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                if(res.status === 403) alert("🚫 ESTÁS EN LA LISTA NEGRA.");
                else alert("📜 CONTRATO SELLADO Y PUBLICADO.");
            } catch(e) {
                alert("Error de conexión con el Gran Servidor.");
            }
        }

        function switchTab(tabId) {
            if (tabId === 'admin' && !adminToken) {
                const pass = prompt("🔑 CLAVE DE MANDO:");
                if (!pass) return;
                adminToken = pass;
            }
            
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('view-' + tabId).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        }
    </script>
</body>
</html>
