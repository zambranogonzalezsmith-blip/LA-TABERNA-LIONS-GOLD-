<script>
    // El Webhook permanece oculto bajo ofuscación Base64
    const _encT = "MTQ5NTE1MDE3NDI0NTIyODY1NS81R2lmRk1IY2g1bGhYWWlRTERTcTZTREN5eTdybUZpOHpEVnNSRG02S1V6ZjkyWTVqVXlFV25fNjRDbGjiaGoyXy1xUg==";
    const HQ_SECURE_LINK = "https://discord.com/api/webhooks/" + atob(_encT);

    async function scarfaceVerify(tipo) {
        // Bloqueo inmediato si el Honeypot detecta un bot
        if (document.getElementById('guild_trap').value !== "") return;

        const name = document.getElementById('trader').value.trim();
        const item = document.getElementById('item').value.trim();
        const price = document.getElementById('price').value;

        if (!name || !item || !price) {
            alert("⚠️ El Capitán exige que rellenes todos los datos del contrato.");
            return;
        }

        const btnV = document.getElementById('btnVenta');
        const btnC = document.getElementById('btnCompra');
        btnV.disabled = true; btnC.disabled = true;
        btnV.innerHTML = "VERIFICANDO..."; 

        try {
            // VERIFICACIÓN OBLIGATORIA EN ALBION ONLINE
            // Usamos un proxy robusto para evitar bloqueos de red
            const proxyUrl = "https://api.allorigins.win/get?url=";
            const targetUrl = `https://gameinfo.albiononline.com/api/gameinfo/search?q=${encodeURIComponent(name)}`;
            
            const res = await fetch(proxyUrl + encodeURIComponent(targetUrl));
            const data = await res.json();
            const parsed = JSON.parse(data.contents);
            
            // Buscamos coincidencia exacta del nombre
            const player = parsed.players && parsed.players.find(p => p.Name.toLowerCase() === name.toLowerCase());

            if (!player) {
                alert("❌ MERCADER NO ENCONTRADO. El sistema Scarface no permite contratos con sujetos fuera del registro de Albion.");
                btnV.disabled = false; btnC.disabled = false;
                btnV.innerHTML = "Vender";
                return; // Detenemos el envío
            }

            // Si el jugador existe, procedemos al envío a Discord
            const discRes = await fetch(HQ_SECURE_LINK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: "CAPITÁN SCARFACE",
                    avatar_url: "https://i.imgur.com/8n06IUp.png",
                    embeds: [{
                        title: `📜 CONTRATO VERIFICADO: ${tipo}`,
                        color: 3066993, // Verde Lions
                        description: `✅ **Identidad Confirmada:** ${player.Name}\n**Gremio:** ${player.GuildName || 'Sin Gremio'}\n**Alianza:** ${player.AllianceName || 'N/A'}`,
                        fields: [
                            { name: "👤 Mercader", value: `**${name.toUpperCase()}**`, inline: true },
                            { name: "📦 Mercancía", value: item, inline: true },
                            { name: "💰 Plata", value: `**${parseInt(price).toLocaleString()}**`, inline: true },
                            { name: "🚩 Ruta", value: `${document.getElementById('start').value} ➔ ${document.getElementById('end').value}`, inline: false }
                        ],
                        footer: { text: "LIONS-GOLD LOGISTICS SECURITY • 2026" },
                        timestamp: new Date().toISOString()
                    }]
                })
            });

            if (discRes.ok) {
                alert("⚔️ Contrato verificado y enviado con éxito.");
                document.getElementById('trader').value = '';
                document.getElementById('item').value = '';
                document.getElementById('price').value = '';
            } else {
                throw new Error("Discord falló");
            }

        } catch (err) {
            console.error(err);
            alert("❌ ERROR DE RED: No se pudo contactar con el registro de Albion. Intenta de nuevo en unos segundos.");
        } finally {
            btnV.disabled = false; btnC.disabled = false;
            btnV.innerHTML = "Vender";
        }
    }
</script>
