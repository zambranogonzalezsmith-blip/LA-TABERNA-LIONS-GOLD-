<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIONS-GOLD | TABERNA Y MERCADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;700&family=MedievalSharp&family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --m-gold: #ffd700;
            --m-wood: #3e2723;
            --m-wood-dark: #1b100a;
            --m-green: #2e7d32;
            --m-white: #f5f5f5;
        }

        body { 
            background-color: #0a0a0a;
            background-image: linear-gradient(rgba(10, 10, 10, 0.85), rgba(15, 10, 5, 0.95)), 
                              url('https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .font-rpg { font-family: 'Cinzel', serif; }
        .font-medieval { font-family: 'MedievalSharp', cursive; }
        .font-mono { font-family: 'Roboto Mono', monospace; }

        .rpg-panel {
            background: linear-gradient(145deg, rgba(45, 27, 19, 0.9), rgba(20, 12, 8, 0.95));
            border: 2px solid #5d4037;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 15px 35px rgba(0,0,0,0.9);
            border-radius: 8px;
            position: relative;
        }

        .btn-rpg {
            background: linear-gradient(to bottom, #8d6e63 0%, #3e2723 100%);
            border: 2px solid var(--m-gold);
            color: var(--m-gold);
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 4px 6px rgba(0,0,0,0.6);
        }

        .btn-rpg:hover:not(:disabled) {
            filter: brightness(1.3);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transform: translateY(-2px);
        }

        .input-rpg {
            background: rgba(10, 5, 2, 0.8) !important;
            border: 1px solid #795548 !important;
            color: #d7ccc8;
        }
        .input-rpg:focus { border-color: var(--m-gold) !important; outline: none; }

        .gold-gradient-text {
            background: linear-gradient(to bottom, #fffde7, #ffd700, #ff8f00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .banner-container {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            display: flex; gap: 40px; pointer-events: none; z-index: 0;
        }
        .medieval-banner {
            width: 80px; height: 160px;
            background: linear-gradient(to right, var(--m-white) 50%, var(--m-green) 50%);
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            display: flex; justify-content: center; padding-top: 30px;
        }
        .medieval-banner::after {
            content: ''; position: absolute; bottom: -39px; left: 0;
            border-left: 40px solid transparent; border-right: 40px solid transparent;
            border-top: 40px solid var(--m-green);
        }
        .banner-lion { color: var(--m-gold); font-size: 2.5rem; filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.8)); }

        .tab-active { border-bottom: 3px solid var(--m-gold); color: var(--m-gold); background: linear-gradient(to top, rgba(255, 215, 0, 0.1), transparent); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="banner-container">
        <div class="medieval-banner"><i class="fa-solid fa-lion banner-lion"></i></div>
        <div class="medieval-banner"><i class="fa-solid fa-lion banner-lion"></i></div>
    </div>

    <nav class="bg-black/80 border-b-2 border-[#5d4037] backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between h-20 items-center">
            <div class="flex items-center gap-4 cursor-pointer" onclick="switchTab('market')">
                <div class="p-2 border-2 border-yellow-600 rounded-full bg-black/50">
                    <i class="fa-solid fa-shield-cat text-3xl gold-gradient-text"></i>
                </div>
                <span class="font-medieval font-bold text-3xl tracking-widest gold-gradient-text">LIONS-GOLD</span>
            </div>
            <div class="flex text-xs font-bold uppercase h-full items-center gap-1">
                <button onclick="switchTab('market')" id="btn-market" class="px-4 tab-active h-full">Taberna</button>
                <button onclick="switchTab('exchange')" id="btn-exchange" class="px-4 text-gray-400 hover:text-white h-full">Exchange</button>
                <button onclick="switchTab('admin')" id="btn-admin" class="px-4 text-gray-500 hover:text-yellow-600 h-full">Mando</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 mt-8 flex-grow w-full space-y-12 relative z-10">
        
        <div id="view-market" class="space-y-8">
            <div class="text-center space-y-3 bg-black/60 p-6 rounded-xl border border-yellow-900/30">
                <h2 class="text-5xl font-medieval gold-gradient-text tracking-wider">La Taberna de Lymhurst</h2>
                <div class="text-gray-400 uppercase text-xs tracking-[0.4em] font-rpg">Registro de Contratos de Plata</div>
            </div>

            <div class="rpg-panel p-8 max-w-4xl mx-auto">
                <div class="mb-8 p-6 bg-black/50 rounded-lg border border-gray-700">
                    <label class="font-rpg text-xs text-yellow-500 font-bold uppercase block mb-3">Verificar Mercader en Albion Online</label>
                    <div class="flex gap-3">
                        <input type="text" id="sellerName" placeholder="Nombre del personaje..." class="flex-grow input-rpg p-4 rounded font-bold">
                        <button onclick="verificarJugador()" id="btnVerify" class="bg-blue-900 hover:bg-blue-800 text-blue-100 border border-blue-700 px-6 rounded font-rpg font-bold">
                            VERIFICAR
                        </button>
                    </div>
                    <div id="verifyStatus" class="mt-3 text-xs font-mono text-gray-500 italic">Consulta la base de datos oficial del juego.</div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div class="space-y-3">
                        <label class="font-rpg text-xs text-gray-400 font-bold uppercase">Item / Servicio</label>
                        <input type="text" id="itemName" placeholder="Ej: Silver / Mamut / T8.3..." class="w-full input-rpg p-4 rounded">
                    </div>
                    <div class="space-y-3">
                        <label class="font-rpg text-xs text-gray-400 font-bold uppercase">Ubicación</label>
                        <select id="location" class="w-full input-rpg p-4 rounded appearance-none">
                            <option value="Lymhurst">Lymhurst</option>
                            <option value="Martlock">Martlock</option>
                            <option value="Bridgewatch">Bridgewatch</option>
                            <option value="Fort Sterling">Fort Sterling</option>
                            <option value="Thetford">Thetford</option>
                            <option value="Caerleon">Caerleon</option>
                            <option value="Brecilien">Brecilien</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-3 mb-8">
                    <label class="font-rpg text-xs text-gray-400 font-bold uppercase">Monto Bruto</label>
                    <input type="number" id="amount" oninput="calculatePreview()" placeholder="0" class="w-full input-rpg p-4 rounded font-mono text-yellow-500 text-2xl text-center">
                </div>

                <div class="bg-black/80 border border-yellow-900/50 p-6 rounded-lg mb-8 flex justify-between items-center">
                    <div>
                        <span class="block text-[10px] text-gray-400 uppercase font-black">Fee Gremial (0.06%)</span>
                        <span class="text-xl font-mono text-red-400 font-bold" id="previewFee">0</span>
                    </div>
                    <div class="text-right">
                        <span class="block text-[10px] text-gray-400 uppercase font-black">Neto a Recibir</span>
                        <span class="text-4xl font-mono text-green-500 font-black" id="previewNet">0</span>
                    </div>
                </div>

                <button onclick="createTrade()" id="btnAction" class="w-full btn-rpg py-5 rounded font-rpg font-black tracking-[0.3em] uppercase text-xl">
                    <i class="fa-solid fa-scroll mr-2"></i> Sellar Contrato
                </button>
            </div>
        </div>

        <div id="view-exchange" class="hidden space-y-6">
            <div class="rpg-panel p-6">
                <div class="flex justify-between items-end border-b border-yellow-900/30 pb-4 mb-6">
                    <h2 class="text-3xl font-medieval gold-gradient-text">LIONS EXCHANGE</h2>
                    <div class="text-right font-mono text-xs bg-black/50 p-2 rounded border border-gray-700">
                        <span class="text-gray-400">1M = </span>
                        <span class="text-green-400">$0.52</span> | <span class="text-yellow-400">23.40 Bs</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <div class="lg:col-span-4 bg-black/40 p-5 rounded border border-gray-800">
                        <div class="flex mb-4 bg-black rounded p-1">
                            <button onclick="setExType('VENTA')" id="exBtnVenta" class="w-1/2 py-2 text-xs font-bold rounded bg-red-900/80 text-white">VENTA</button>
                            <button onclick="setExType('COMPRA')" id="exBtnCompra" class="w-1/2 py-2 text-xs font-bold rounded text-gray-500">COMPRA</button>
                        </div>
                        <div class="space-y-4">
                            <input type="text" id="exItem" placeholder="Mercancía..." class="w-full input-rpg p-3 rounded text-sm">
                            <input type="number" id="exPrice" oninput="calcExRates()" placeholder="Precio Plata" class="w-full input-rpg p-3 rounded font-mono text-sm">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" id="exFrom" placeholder="Origen" class="input-rpg p-3 rounded text-xs">
                                <input type="text" id="exTo" placeholder="Destino" class="input-rpg p-3 rounded text-xs">
                            </div>
                            <button onclick="submitExchangeOrder()" class="w-full btn-rpg py-3 rounded font-bold text-sm">PUBLICAR ORDEN</button>
                        </div>
                    </div>

                    <div class="lg:col-span-8 bg-black/40 rounded border border-gray-800 min-h-[300px]">
                        <div id="exchangeBook" class="divide-y divide-gray-800">
                            <div class="p-10 text-center text-xs opacity-50 italic">Cargando mercado...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <div class="rpg-panel p-8">
                <h3 class="font-rpg text-yellow-500 mb-6 flex justify-between items-center text-xl">
                    <span><i class="fa-solid fa-crown mr-2"></i> ARCHIVOS SECRETOS</span>
                    <button onclick="loadAdminLogs()" class="text-xs btn-rpg px-4 py-2 rounded">SINCRONIZAR</button>
                </h3>
                <div id="adminContainer" class="bg-black/60 rounded border border-gray-700 p-4 font-mono text-xs text-gray-400">
                    Esperando autorización de Sargento...
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwQbVXd7_k_l0sESDEGLbLS1sBEVHiQTJXOvJxFLDnTmmmcDhbsaXAXPKh9g2b_pGph/exec";
        let exType = 'VENTA';
        let isVerified = false;

        function switchTab(tabId) {
            ['market', 'exchange', 'admin'].forEach(id => {
                document.getElementById('view-' + id).classList.add('hidden');
                document.getElementById('btn-' + id).classList.remove('tab-active');
            });
            document.getElementById('view-' + tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('tab-active');
            if(tabId === 'exchange') loadExchangeData();
        }

        async function verificarJugador() {
            const nombre = document.getElementById('sellerName').value.trim();
            const statusDiv = document.getElementById('verifyStatus');
            if(!nombre) return;

            statusDiv.innerText = "Consultando Oráculo...";
            try {
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://gameinfo.albiononline.com/api/gameinfo/search?q=' + nombre)}`);
                const data = await res.json();
                const p = data.players.find(x => x.Name.toLowerCase() === nombre.toLowerCase());

                if(p) {
                    statusDiv.innerHTML = `<span class="text-green-400">JUGADOR REAL: [${p.GuildName || 'Sin Gremio'}] - Kill Fame: ${p.KillFame.toLocaleString()}</span>`;
                    isVerified = true;
                } else {
                    statusDiv.innerHTML = `<span class="text-red-500">⚠ JUGADOR NO ENCONTRADO</span>`;
                    isVerified = false;
                }
            } catch(e) { statusDiv.innerText = "Error de conexión con Albion."; }
        }

        function calculatePreview() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const fee = amount * 0.0006;
            document.getElementById('previewFee').innerText = Math.floor(fee).toLocaleString();
            document.getElementById('previewNet').innerText = Math.floor(amount - fee).toLocaleString();
        }

        async function createTrade() {
            const data = {
                action: 'create',
                seller: document.getElementById('sellerName').value,
                item: document.getElementById('itemName').value,
                amount: document.getElementById('amount').value,
                location: document.getElementById('location').value
            };
            if(!data.seller || !data.amount) return alert("Faltan datos en el pergamino.");

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("CONTRATO SELLADO");
                location.reload();
            } catch(e) { alert("Error al enviar."); }
        }

        function loadExchangeData() {
            const script = document.createElement('script');
            script.src = `${API_URL}?callback=renderExchange&t=${Date.now()}`;
            document.body.appendChild(script);
        }

        window.renderExchange = function(data) {
            const container = document.getElementById('exchangeBook');
            container.innerHTML = data.map(o => `
                <div class="p-4 flex justify-between items-center hover:bg-white/5">
                    <div>
                        <span class="${o.type === 'VENTA' ? 'text-red-500' : 'text-green-500'} font-bold">[${o.type}]</span>
                        <span class="ml-2">${o.item}</span>
                    </div>
                    <div class="font-mono text-yellow-500">${parseInt(o.price).toLocaleString()}</div>
                </div>
            `).join('') || '<div class="p-10 text-center">No hay órdenes.</div>';
        };

        function loadAdminLogs() {
            const pass = prompt("CLAVE DE ACCESO:");
            if(!pass) return;
            const script = document.createElement('script');
            script.src = `${API_URL}?token=${pass}&callback=renderAdmin&t=${Date.now()}`;
            document.body.appendChild(script);
        }

        window.renderAdmin = function(data) {
            const cont = document.getElementById('adminContainer');
            cont.innerHTML = data.reverse().map(r => `<div>> ${r.seller} vendió ${r.item} por ${parseInt(r.amount).toLocaleString()}</div>`).join('');
        };
    </script>
</body>
</html>
