<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIONS-GOLD | TABERNA NATIVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap');
        body { background: #0b0e11; color: #eaecef; font-family: 'Inter', sans-serif; }
        .font-rpg { font-family: 'Cinzel', serif; }
        .panel { background: #161a1e; border: 1px solid #2b3139; }
        .input-lions { background: #2b3139; border: 1px solid #363c44; color: white; padding: 12px; border-radius: 4px; font-size: 14px; width: 100%; }
        .input-lions:focus { border-color: #c5a059; outline: none; }
    </style>
</head>
<body class="min-h-screen p-4">

    <header class="max-w-6xl mx-auto mb-6 flex justify-between items-center border-b border-gray-800 pb-4">
        <div>
            <h1 class="font-rpg text-2xl text-amber-500 tracking-widest"><i class="fa-solid fa-lion"></i> LIONS-GOLD</h1>
            <p class="text-[10px] text-gray-500 uppercase">Base de Datos Nativa GitHub</p>
        </div>
        <button onclick="loadOrders()" class="text-amber-500 text-xs font-bold px-3 py-2 border border-amber-500/20 rounded hover:bg-amber-500/10">
            <i class="fa-solid fa-sync-alt"></i> ACTUALIZAR
        </button>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4">
            <div class="panel p-6 rounded-lg border-t-4 border-amber-600">
                <div class="flex gap-2 mb-6 bg-black/40 p-1 rounded">
                    <button onclick="currentType='VENTA'" class="flex-1 py-2 text-[10px] font-bold rounded bg-red-600 text-white">VENTA</button>
                    <button onclick="currentType='COMPRA'" class="flex-1 py-2 text-[10px] font-bold rounded text-gray-500">COMPRA</button>
                </div>
                <div class="space-y-4">
                    <input type="text" id="trader" placeholder="Tu Nombre" class="input-lions">
                    <input type="text" id="item" placeholder="Item / Recurso" class="input-lions">
                    <input type="number" id="price" placeholder="Precio Silver" class="input-lions text-amber-400 font-bold">
                    <button onclick="sendToGithub()" id="btnAction" class="w-full py-4 rounded font-black text-xs bg-amber-600 text-white uppercase tracking-widest">
                        Sellar en GitHub
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div id="orderList" class="space-y-3">
                <div class="text-center py-20 text-gray-600 italic">Cargando órdenes desde el repositorio...</div>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN GLOBAL
        const TOKEN = "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"
        const REPO = "zambranogonzalezsmith-blip/LA-TABERNA-LIONS-GOLD-";
        const FILE = "orders.json";
        let currentType = 'VENTA';

        // 1. CARGAR DESDE GITHUB
        async function loadOrders() {
            const list = document.getElementById('orderList');
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}?t=${Date.now()}`, {
                    headers: { "Authorization": `token ${TOKEN}` }
                });
                const data = await res.json();
                const orders = JSON.parse(atob(data.content));

                if (orders.length === 0) {
                    list.innerHTML = '<p class="text-center text-gray-700 py-10 italic">El pergamino está vacío.</p>';
                    return;
                }

                list.innerHTML = orders.reverse().map(o => `
                    <div class="panel p-4 rounded border-l-4 border-${o.type === 'VENTA' ? 'red' : 'green'}-600 flex justify-between items-center">
                        <div>
                            <span class="text-[9px] font-bold text-amber-500 uppercase">${o.trader}</span>
                            <h3 class="text-sm font-bold text-white uppercase">${o.item}</h3>
                        </div>
                        <div class="text-right font-mono">
                            <p class="text-sm font-bold">${parseInt(o.price).toLocaleString()} Silver</p>
                            <p class="text-[9px] text-gray-500">${new Date(o.date).toLocaleString()}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = `<p class="text-red-500 text-center py-10">Error de conexión: Verifica el Token o el Repositorio.</p>`;
            }
        }

        // 2. ENVIAR A GITHUB (COMMIT)
        async function sendToGithub() {
            const btn = document.getElementById('btnAction');
            const trader = document.getElementById('trader').value;
            const item = document.getElementById('item').value;
            const price = document.getElementById('price').value;

            if (!trader || !item || !price) return alert("Completa los datos.");

            btn.disabled = true;
            btn.innerText = "ESCRIBIENDO EN EL REPO...";

            try {
                // Paso A: Obtener el archivo actual y su SHA
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
                    headers: { "Authorization": `token ${TOKEN}` }
                });
                const data = await res.json();
                const currentOrders = JSON.parse(atob(data.content));

                // Paso B: Añadir nueva orden
                const newOrder = {
                    type: currentType,
                    trader: trader,
                    item: item,
                    price: price,
                    date: new Date().toISOString()
                };
                currentOrders.push(newOrder);

                // Paso C: Subir actualización (Commit)
                const updateRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Nueva orden de ${trader}`,
                        content: btoa(JSON.stringify(currentOrders, null, 2)),
                        sha: data.sha
                    })
                });

                if (updateRes.ok) {
                    alert("¡Orden grabada en el repositorio!");
                    loadOrders();
                } else {
                    alert("Error al grabar en GitHub.");
                }
            } catch (e) {
                alert("Error crítico de API.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Sellar en GitHub";
            }
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
