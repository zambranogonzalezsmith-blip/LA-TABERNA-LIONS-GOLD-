<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIONS-GOLD | EXCHANGE P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        :root { --gold: #c5a059; --bg-dark: #0b0e11; }
        body { background: var(--bg-dark); color: #eaecef; font-family: 'Inter', sans-serif; }
        .font-rpg { font-family: 'Cinzel', serif; }
        .trade-panel { background: #161a1e; border: 1px solid #2b3139; }
        .input-trade { background: #2b3139; border: 1px solid transparent; color: white; }
        .pergamino { background: #f4e4bc; color: #5d4037; border-top: 4px solid #8d6e63; border-bottom: 4px solid #8d6e63; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-4 bg-[#161a1e] border-b border-gray-800 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-lion text-2xl text-amber-500"></i>
            <span class="font-rpg font-black text-lg">LIONS-EXCHANGE</span>
        </div>
        <div class="flex gap-4 text-[10px] font-mono bg-black/40 px-3 py-1.5 rounded border border-gray-800">
            <span class="text-gray-400">1M / USD: <b class="text-green-500">$0.52</b></span>
            <span class="text-gray-400">1M / BS: <b class="text-yellow-500">23.40</b></span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow w-full mt-4">
        
        <div class="lg:col-span-4 space-y-4">
            <div class="trade-panel p-6 rounded-lg shadow-xl">
                <h2 class="font-rpg text-amber-500 text-xs mb-5 uppercase tracking-widest">Nuevo Contrato</h2>
                
                <div class="flex mb-5 bg-black/50 rounded p-1 border border-gray-800">
                    <button onclick="setOrderType('VENTA')" id="btnVenta" class="w-1/2 py-2 text-xs font-bold rounded bg-red-500/20 text-red-500">VENTA</button>
                    <button onclick="setOrderType('COMPRA')" id="btnCompra" class="w-1/2 py-2 text-xs font-bold rounded text-gray-500">COMPRA</button>
                </div>

                <div class="space-y-4">
                    <input type="text" id="traderName" placeholder="Tu Nombre en Albion" class="w-full p-3 rounded input-trade text-sm font-bold">
                    <div class="grid grid-cols-3 gap-2">
                        <input type="text" id="itemName" placeholder="Item" class="col-span-2 p-3 rounded input-trade text-sm">
                        <input type="number" id="quantity" placeholder="Cant." class="p-3 rounded input-trade text-sm text-center" value="1">
                    </div>
                    <input type="number" id="price" placeholder="Precio Total (Silver)" class="w-full p-3 rounded input-trade text-sm font-mono text-amber-500">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="locStart" placeholder="Origen" class="w-full p-3 rounded input-trade text-[10px]">
                        <input type="text" id="locEnd" placeholder="Destino" class="w-full p-3 rounded input-trade text-[10px]">
                    </div>

                    <button onclick="submitOrder()" id="mainActionBtn" class="w-full py-4 rounded font-black text-sm bg-red-600 hover:bg-red-500 transition-all">
                        COLOCAR ORDEN
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 trade-panel rounded-lg overflow-hidden flex flex-col h-[600px]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-black/40">
                <span class="text-xs font-bold uppercase text-gray-400">Libro de Órdenes en Vivo</span>
                <button onclick="loadOrders()" class="text-[10px] text-amber-500 border border-amber-900/50 px-2 py-1 rounded hover:bg-amber-900/20">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
            
            <div id="orderBook" class="flex-grow overflow-y-auto divide-y divide-gray-800/50">
                <p class="p-10 text-center text-gray-600 italic">Cargando datos del Cuartel General...</p>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-6">
        <div class="pergamino max-w-lg mx-auto p-4 text-center">
            <p class="font-rpg text-xl font-black">LYMHURST HQ</p>
            <p class="text-[9px] font-mono opacity-60">Lions-Gold Logistics Division</p>
        </div>
    </footer>

    <script>
        // URL FINAL PROPORCIONADA
        const API_URL = "https://script.google.com/macros/s/AKfycbx9J6dtrm9tnAJvTp2tWHrsqDJ-7BXngrge_yFXd3STlfBwVcpQpnxdbMxrIH4AzKPOwQ/exec";
        
        let currentType = 'VENTA';

        function setOrderType(type) {
            currentType = type;
            const btnV = document.getElementById('btnVenta');
            const btnC = document.getElementById('btnCompra');
            const actionBtn = document.getElementById('mainActionBtn');
            
            if(type === 'VENTA') {
                btnV.className = "w-1/2 py-2 text-xs font-bold rounded bg-red-500/20 text-red-500";
                btnC.className = "w-1/2 py-2 text-xs font-bold rounded text-gray-500";
                actionBtn.className = "w-full py-4 rounded font-black text-sm bg-red-600 hover:bg-red-500";
            } else {
                btnC.className = "w-1/2 py-2 text-xs font-bold rounded bg-green-500/20 text-green-500";
                btnV.className = "w-1/2 py-2 text-xs font-bold rounded text-gray-500";
                actionBtn.className = "w-full py-4 rounded font-black text-sm bg-green-600 hover:bg-green-500";
            }
        }

        async function submitOrder() {
            const btn = document.getElementById('mainActionBtn');
            const data = {
                action: 'create',
                type: currentType,
                trader: document.getElementById('traderName').value.trim(),
                item: document.getElementById('itemName').value.trim(),
                qty: document.getElementById('quantity').value || 1,
                price: document.getElementById('price').value,
                locStart: document.getElementById('locStart').value || 'S/D',
                locEnd: document.getElementById('locEnd').value || 'S/D'
            };

            if(!data.trader || !data.item || !data.price) return alert("Complete los campos.");

            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("¡Orden publicada!");
                setTimeout(loadOrders, 1500);
            } catch(e) { 
                alert("Error de red."); 
            } finally {
                btn.disabled = false;
                btn.innerText = "COLOCAR ORDEN";
            }
        }

        async function loadOrders() {
            const container = document.getElementById('orderBook');
            
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if(!data || data.length === 0) {
                    container.innerHTML = '<p class="p-10 text-center text-xs text-gray-600">No hay órdenes en el mercado.</p>';
                    return;
                }

                container.innerHTML = data.reverse().map(o => {
                    // MAPEADOR HÍBRIDO: Detecta columnas en español o inglés
                    const mercader = o.mercader || o.trader || 'Anónimo';
                    const item = o.item || 'Desconocido';
                    const precio = o.precio || o.price || 0;
                    const tipo = (o.tipo || o.type || 'VENTA').toUpperCase();
                    const cantidad = o.cantidad || o.qty || 1;

                    return `
                    <div class="grid grid-cols-4 p-4 items-center hover:bg-white/5 border-l-4 ${tipo === 'VENTA' ? 'border-red-500' : 'border-green-500'}">
                        <div class="col-span-2">
                            <span class="block text-xs font-bold text-amber-400">${mercader}</span>
                            <span class="block text-[11px] text-white uppercase font-bold">${cantidad}x ${item}</span>
                        </div>
                        <div class="text-right">
                            <span class="block font-mono text-sm ${tipo === 'VENTA' ? 'text-red-400' : 'text-green-400'}">${parseInt(precio).toLocaleString()} <i class="fa-solid fa-coins opacity-40"></i></span>
                            <span class="text-[9px] text-gray-500">$${((precio/1000000)*0.52).toFixed(2)} USD</span>
                        </div>
                        <div class="text-right pr-2">
                            <span class="text-[8px] text-gray-500 block uppercase">${o.origen || o.locstart || '-'} > ${o.destino || o.locend || '-'}</span>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch(e) { 
                container.innerHTML = '<p class="p-10 text-center text-red-500 text-xs italic font-mono">Error al conectar con Backend. Verifique permisos de Google Apps Script.</p>'; 
            }
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
