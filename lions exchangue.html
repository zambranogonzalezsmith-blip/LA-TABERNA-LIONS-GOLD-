<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIONS-GOLD | EXCHANGE P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        :root { --gold: #c5a059; --bg-dark: #0b0e11; }
        body { background: var(--bg-dark); color: #eaecef; font-family: 'Inter', sans-serif; }
        .font-rpg { font-family: 'Cinzel', serif; }
        .trade-panel { background: #161a1e; border: 1px solid #2b3139; }
        .input-trade { background: #2b3139; border: 1px solid transparent; color: white; transition: 0.3s; }
        .input-trade:focus { border-color: var(--gold); outline: none; }
        .pergamino { background: #f4e4bc; color: #5d4037; border-top: 4px solid #8d6e63; border-bottom: 4px solid #8d6e63; }
        
        /* Animación de carga */
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-4 bg-[#161a1e] border-b border-gray-800 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-lion text-2xl text-amber-500 drop-shadow-[0_0_8px_rgba(245,158,11,0.5)]"></i>
            <span class="font-rpg font-black text-lg tracking-tighter">LIONS-EXCHANGE</span>
        </div>
        <div class="flex gap-4 text-[10px] font-mono bg-black/40 px-3 py-1.5 rounded border border-gray-800">
            <span class="text-gray-400">1M SILVER / USD: <b class="text-green-500">$0.52</b></span>
            <span class="text-gray-400">1M SILVER / BS: <b class="text-yellow-500">23.40</b></span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow w-full mt-4">
        
        <div class="lg:col-span-4 space-y-4">
            <div class="trade-panel p-6 rounded-lg shadow-xl relative overflow-hidden">
                <h2 class="font-rpg text-amber-500 text-xs mb-5 uppercase tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-file-signature"></i> Registrar Contrato
                </h2>
                
                <div class="flex mb-5 bg-black/50 rounded p-1 border border-gray-800">
                    <button onclick="setOrderType('VENTA')" id="btnVenta" class="w-1/2 py-2.5 text-xs font-bold rounded bg-red-500/20 text-red-500 transition-all">VENTA</button>
                    <button onclick="setOrderType('COMPRA')" id="btnCompra" class="w-1/2 py-2.5 text-xs font-bold rounded text-gray-500 hover:text-white transition-all">COMPRA</button>
                </div>

                <div class="space-y-4 relative z-10">
                    <input type="text" id="traderName" placeholder="Tu Nombre en Albion" class="w-full p-3 rounded input-trade text-sm font-bold border-gray-700">
                    <div class="grid grid-cols-3 gap-2">
                        <input type="text" id="itemName" placeholder="Item / Recurso" class="col-span-2 p-3 rounded input-trade text-sm border-gray-700">
                        <input type="number" id="quantity" placeholder="Cant." class="p-3 rounded input-trade text-sm text-center border-gray-700" value="1">
                    </div>
                    <input type="number" id="price" oninput="calcExchange()" placeholder="Precio Total (Silver)" class="w-full p-3 rounded input-trade text-sm font-mono text-amber-500 border-gray-700">
                    
                    <div class="grid grid-cols-2 gap-2 pt-2 border-t border-gray-800">
                        <input type="text" id="locStart" placeholder="Origen (Ej: Lym)" class="w-full p-3 rounded input-trade text-[10px] border-gray-700">
                        <input type="text" id="locEnd" placeholder="Destino (Ej: Caer)" class="w-full p-3 rounded input-trade text-[10px] border-gray-700">
                    </div>

                    <div class="p-4 bg-black/60 rounded border border-gray-800 space-y-1 font-mono text-[11px]">
                        <div class="flex justify-between text-gray-400"><span>Equiv. BS:</span> <span id="valBS" class="text-yellow-500 font-bold">0.00 Bs</span></div>
                        <div class="flex justify-between text-gray-400"><span>Equiv. USD:</span> <span id="valUSD" class="text-green-500 font-bold">$0.00</span></div>
                    </div>

                    <button onclick="submitOrder()" id="mainActionBtn" class="w-full py-4 rounded font-black text-sm bg-red-600 hover:bg-red-500 transition-all shadow-lg">
                        PUBLICAR ORDEN DE VENTA
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 trade-panel rounded-lg overflow-hidden flex flex-col h-[650px] shadow-2xl">
            <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-black/40">
                <div class="flex flex-col">
                    <span class="text-xs font-bold uppercase tracking-widest text-gray-300">Mercado en Tiempo Real</span>
                    <span class="text-[9px] text-amber-600 font-mono">Sincronizado con Cuartel General LIONS-GOLD</span>
                </div>
                <button onclick="loadOrders()" class="text-xs text-amber-500 hover:bg-amber-900/20 px-3 py-2 rounded border border-amber-900/30 transition-all">
                    <i class="fa-solid fa-rotate mr-1"></i> Actualizar Libro
                </button>
            </div>
            
            <div class="grid grid-cols-5 p-3 text-[10px] uppercase font-bold text-gray-500 bg-[#0d1014] border-b border-gray-800">
                <span class="col-span-2 pl-2">Tipo / Mercader / Item</span>
                <span class="text-right">Precio Total</span>
                <span class="text-right">Ruta Logística</span>
                <span class="text-right pr-2">Estatus</span>
            </div>

            <div id="orderBook" class="flex-grow overflow-y-auto divide-y divide-gray-800/50 bg-[#0b0e11]">
                </div>
        </div>
    </main>

    <footer class="mt-auto py-8">
        <div class="pergamino max-w-lg mx-auto p-6 text-center shadow-2xl relative">
            <p class="font-rpg text-2xl font-black tracking-tighter">LYMHURST HQ</p>
            <div class="h-[1px] bg-black/10 w-2/3 mx-auto my-2"></div>
            <p class="text-[10px] font-mono uppercase tracking-[0.3em] font-bold opacity-70 text-amber-900">División Logística Lions-Gold</p>
        </div>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx9J6dtrm9tnAJvTp2tWHrsqDJ-7BXngrge_yFXd3STlfBwVcpQpnxdbMxrIH4AzKPOwQ/exec";
        
        let currentType = 'VENTA';
        const RATE_USD = 0.52; 
        const RATE_BS = 23.40; 

        function setOrderType(type) {
            currentType = type;
            const btnV = document.getElementById('btnVenta');
            const btnC = document.getElementById('btnCompra');
            const actionBtn = document.getElementById('mainActionBtn');
            
            if(type === 'VENTA') {
                btnV.className = "w-1/2 py-2.5 text-xs font-bold rounded bg-red-500/20 text-red-500";
                btnC.className = "w-1/2 py-2.5 text-xs font-bold rounded text-gray-500";
                actionBtn.className = "w-full py-4 rounded font-black text-sm bg-red-600 hover:bg-red-500";
                actionBtn.innerText = "PUBLICAR ORDEN DE VENTA";
            } else {
                btnC.className = "w-1/2 py-2.5 text-xs font-bold rounded bg-green-500/20 text-green-500";
                btnV.className = "w-1/2 py-2.5 text-xs font-bold rounded text-gray-500";
                actionBtn.className = "w-full py-4 rounded font-black text-sm bg-green-600 hover:bg-green-500";
                actionBtn.innerText = "PUBLICAR ORDEN DE COMPRA";
            }
        }

        function calcExchange() {
            const price = parseFloat(document.getElementById('price').value) || 0;
            const millions = price / 1000000;
            document.getElementById('valBS').innerText = (millions * RATE_BS).toFixed(2) + " Bs";
            document.getElementById('valUSD').innerText = "$" + (millions * RATE_USD).toFixed(2);
        }

        async function submitOrder() {
            const btn = document.getElementById('mainActionBtn');
            const data = {
                action: 'create',
                type: currentType,
                trader: document.getElementById('traderName').value.trim(),
                item: document.getElementById('itemName').value.trim(),
                qty: document.getElementById('quantity').value || 1,
                price: document.getElementById('price').value,
                locStart: document.getElementById('locStart').value.trim() || 'Lymhurst',
                locEnd: document.getElementById('locEnd').value.trim() || 'Brecilien'
            };

            if(!data.trader || !data.item || !data.price) return alert("⚠️ Error: Datos incompletos.");

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> SELLANDO CONTRATO...';

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("✅ Orden desplegada en el mercado.");
                // Limpiamos solo campos necesarios
                document.getElementById('itemName').value = '';
                document.getElementById('price').value = '';
                calcExchange();
                setTimeout(loadOrders, 1500);
            } catch(e) { 
                alert("❌ Error de conexión con el Cuartel General."); 
            } finally {
                btn.disabled = false;
                setOrderType(currentType);
            }
        }

        async function loadOrders() {
            const container = document.getElementById('orderBook');
            container.innerHTML = '<div class="p-12 text-center text-amber-500/50 loading-pulse"><i class="fa-solid fa-lion text-4xl mb-3"></i><p class="text-[10px] font-mono">CONSULTANDO MANIFIESTOS...</p></div>';
            
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if(!data || data.length === 0) {
                    container.innerHTML = '<p class="p-10 text-center text-xs text-gray-600 font-mono italic">El libro de órdenes está vacío...</p>';
                    return;
                }

                // Invertimos para ver las más nuevas arriba
                container.innerHTML = data.reverse().map(o => {
                    const tipo = (o.tipo || o.type || 'VENTA').toUpperCase();
                    const mercader = o.mercader || o.trader || 'Anónimo';
                    const item = o.item || 'S/D';
                    const precio = o.precio || o.price || 0;
                    const colorTipo = tipo === 'VENTA' ? 'text-red-500 bg-red-500/10' : 'text-green-500 bg-green-500/10';
                    const borderTipo = tipo === 'VENTA' ? 'border-red-600/50' : 'border-green-600/50';

                    return `
                    <div class="grid grid-cols-5 p-4 items-center hover:bg-white/5 transition-all border-l-4 ${tipo === 'VENTA' ? 'border-red-600' : 'border-green-600'}">
                        <div class="col-span-2 pl-2">
                            <span class="inline-block text-[8px] font-black px-2 py-0.5 rounded border ${colorTipo} ${borderTipo} mb-1">${tipo}</span>
                            <span class="block text-xs font-bold text-amber-400"><i class="fa-solid fa-user-shield text-[9px] opacity-40"></i> ${mercader}</span>
                            <span class="block text-[11px] text-white uppercase font-bold mt-0.5">${o.cantidad || o.qty || 1}x ${item}</span>
                        </div>
                        <div class="text-right">
                            <span class="block font-mono text-sm font-bold ${tipo === 'VENTA' ? 'text-red-400' : 'text-green-400'}">${parseInt(precio).toLocaleString()} <i class="fa-solid fa-coins opacity-40 text-[10px]"></i></span>
                            <span class="text-[9px] text-gray-500 font-mono">$${((precio/1000000)*0.52).toFixed(2)} USD</span>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] text-gray-300 block font-mono">${o.origen || o.locstart || '??'} <i class="fa-solid fa-chevron-right text-[7px] text-amber-700"></i> ${o.destino || o.locend || '??'}</span>
                            <span class="text-[8px] text-gray-600 font-mono uppercase mt-1 inline-block">F. Límite: ${o.fechalimite || 'ASAP'}</span>
                        </div>
                        <div class="text-right pr-2">
                            <span class="text-[9px] px-2 py-1 rounded bg-amber-500/5 text-amber-600 border border-amber-900/30 font-bold">ACTIVA</span>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch(e) { 
                container.innerHTML = '<div class="p-10 text-center"><p class="text-red-500 text-xs font-mono">⚠️ Error Crítico: No se pudo enlazar con la API.<br>Verifique los permisos del Script.</p></div>'; 
            }
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
