<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIONS-GOLD | EXCHANGE P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        :root { --gold: #c5a059; --bg-dark: #0b0e11; }
        body { background: var(--bg-dark); color: #eaecef; font-family: 'Inter', sans-serif; }
        .font-rpg { font-family: 'Cinzel', serif; }
        .trade-panel { background: #161a1e; border: 1px solid #2b3139; }
        .input-trade { background: #2b3139; border: 1px solid transparent; color: white; transition: 0.3s; }
        .input-trade:focus { border-color: var(--gold); outline: none; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .new-order { animation: slideIn 0.4s ease-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-4 bg-[#161a1e] border-b border-gray-800 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-lion text-2xl text-amber-500"></i>
            <span class="font-rpg font-black text-lg">LIONS-EXCHANGE</span>
        </div>
        <div class="flex gap-4 text-[10px] font-mono bg-black/40 px-3 py-1.5 rounded border border-gray-800">
            <span class="text-gray-400">1M / USD: <b id="rateUSD" class="text-green-500">$0.52</b></span>
            <span class="text-gray-400">1M / BS: <b id="rateBS" class="text-yellow-500">23.40</b></span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow w-full mt-4">
        
        <div class="lg:col-span-4 space-y-4">
            <div class="trade-panel p-6 rounded-lg shadow-xl border-t-2 border-amber-600/30">
                <h2 class="font-rpg text-amber-500 text-xs mb-5 uppercase tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-scroll"></i> Emitir Contrato
                </h2>
                
                <div class="flex mb-5 bg-black/50 rounded p-1 border border-gray-800">
                    <button onclick="setOrderType('VENTA')" id="btnVenta" class="w-1/2 py-2.5 text-xs font-bold rounded bg-red-500/20 text-red-500">VENTA</button>
                    <button onclick="setOrderType('COMPRA')" id="btnCompra" class="w-1/2 py-2.5 text-xs font-bold rounded text-gray-500">COMPRA</button>
                </div>

                <div class="space-y-4">
                    <input type="text" id="traderName" placeholder="Nombre del Comerciante" class="w-full p-3 rounded input-trade text-sm font-bold">
                    <div class="grid grid-cols-3 gap-2">
                        <input type="text" id="itemName" placeholder="Item / Recurso" class="col-span-2 p-3 rounded input-trade text-sm">
                        <input type="number" id="quantity" placeholder="Cant." class="p-3 rounded input-trade text-sm text-center" value="1">
                    </div>
                    <input type="number" id="price" placeholder="Precio Silver Total" class="w-full p-3 rounded input-trade text-sm font-mono text-amber-500">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="locStart" placeholder="Ciudad Origen" class="w-full p-3 rounded input-trade text-[10px]">
                        <input type="text" id="locEnd" placeholder="Ciudad Destino" class="w-full p-3 rounded input-trade text-[10px]">
                    </div>

                    <button onclick="submitOrder()" id="mainActionBtn" class="w-full py-4 rounded font-black text-sm bg-red-600 hover:bg-red-500 transition-all uppercase tracking-widest">
                        Publicar Orden de Venta
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 trade-panel rounded-lg overflow-hidden flex flex-col h-[650px]">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-black/40">
                <span class="text-xs font-bold uppercase tracking-widest text-gray-300">Libro de Órdenes en Tiempo Real</span>
                <button onclick="loadOrders()" class="text-[10px] text-amber-500 hover:text-amber-300 transition-colors">
                    <i class="fa-solid fa-rotate mr-1"></i> Sincronizar HQ
                </button>
            </div>
            
            <div id="orderBook" class="flex-grow overflow-y-auto divide-y divide-gray-800/50 bg-[#0d1014]">
                <div class="p-20 text-center text-gray-600">
                    <i class="fa-solid fa-spinner animate-spin text-2xl mb-4"></i>
                    <p class="text-xs italic">Sincronizando con la red LIONS...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx9J6dtrm9tnAJvTp2tWHrsqDJ-7BXngrge_yFXd3STlfBwVcpQpnxdbMxrIH4AzKPOwQ/exec";
        let currentType = 'VENTA';
        
        // Tasas de cambio (puedes ajustarlas aquí o traerlas de una celda de Excel)
        const RATES = { usd: 0.52, bs: 23.40 };

        function setOrderType(type) {
            currentType = type;
            const btnV = document.getElementById('btnVenta');
            const btnC = document.getElementById('btnCompra');
            const actionBtn = document.getElementById('mainActionBtn');
            
            if(type === 'VENTA') {
                btnV.className = "w-1/2 py-2.5 text-xs font-bold rounded bg-red-500/20 text-red-500";
                btnC.className = "w-1/2 py-2.5 text-xs font-bold rounded text-gray-500";
                actionBtn.className = "w-full py-4 rounded font-black text-sm bg-red-600 hover:bg-red-500";
                actionBtn.innerText = "Publicar Orden de Venta";
            } else {
                btnV.className = "w-1/2 py-2.5 text-xs font-bold rounded text-gray-500";
                btnC.className = "w-1/2 py-2.5 text-xs font-bold rounded bg-green-500/20 text-green-500";
                actionBtn.className = "w-full py-4 rounded font-black text-sm bg-green-600 hover:bg-green-500";
                actionBtn.innerText = "Publicar Orden de Compra";
            }
        }

        function loadOrders() {
            const container = document.getElementById('orderBook');
            const script = document.createElement('script');
            script.src = `${API_URL}?callback=renderOrders&t=${Date.now()}`;
            document.body.appendChild(script);
            script.onload = () => script.remove();
        }

        window.renderOrders = function(data) {
            const container = document.getElementById('orderBook');
            if(!data || data.length === 0 || data.error) {
                container.innerHTML = '<p class="p-10 text-center text-gray-600 text-xs italic">No hay órdenes activas en el mercado.</p>';
                return;
            }

            container.innerHTML = data.reverse().map(o => {
                const tipo = (o.type || o.tipo || 'VENTA').toUpperCase();
                const precio = parseFloat(o.price || o.precio || 0);
                const usdVal = ((precio/1000000) * RATES.usd).toFixed(2);
                
                return `
                <div class="grid grid-cols-4 p-4 items-center hover:bg-white/5 border-l-4 ${tipo === 'VENTA' ? 'border-red-600' : 'border-green-600'} transition-all new-order">
                    <div class="col-span-2">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[8px] font-black px-2 py-0.5 rounded border ${tipo === 'VENTA' ? 'text-red-500 border-red-500/20 bg-red-500/10' : 'text-green-500 border-green-500/20 bg-green-500/10'}">${tipo}</span>
                            <span class="text-[10px] text-amber-500 font-bold">${o.trader || 'Anon'}</span>
                        </div>
                        <span class="block text-xs text-white uppercase font-bold tracking-tight">${o.qty || 1}x ${o.item || 'S/D'}</span>
                    </div>
                    <div class="text-right">
                        <span class="block font-mono text-sm font-bold ${tipo === 'VENTA' ? 'text-red-400' : 'text-green-400'}">${Math.floor(precio).toLocaleString()}</span>
                        <span class="text-[9px] text-gray-500 font-mono italic">$${usdVal} USD</span>
                    </div>
                    <div class="text-right">
                        <div class="text-[9px] text-gray-400 bg-gray-900/50 p-1 rounded inline-block">
                            ${o.locStart || 'City'} <i class="fa-solid fa-chevron-right text-[7px] text-amber-600"></i> ${o.locEnd || 'City'}
                        </div>
                    </div>
                </div>`;
            }).join('');
        };

        async function submitOrder() {
            const btn = document.getElementById('mainActionBtn');
            const trader = document.getElementById('traderName').value.trim();
            const item = document.getElementById('itemName').value.trim();
            const price = document.getElementById('price').value;

            if(!trader || !item || !price) {
                alert("⚠ Mando requiere todos los datos para sellar el contrato.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-feather-pointed animate-bounce mr-2"></i> ESCRIBIENDO...';

            const payload = new URLSearchParams();
            payload.append('action', 'create');
            payload.append('type', currentType);
            payload.append('trader', trader);
            payload.append('item', item);
            payload.append('qty', document.getElementById('quantity').value || 1);
            payload.append('price', price);
            payload.append('locStart', document.getElementById('locStart').value.trim() || 'Lymhurst');
            payload.append('locEnd', document.getElementById('locEnd').value.trim() || 'Caerleon');

            try {
                // El POST a Google Scripts con mode: no-cors es ciego, pero efectivo
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: payload
                });

                // Limpiar y Recargar
                document.getElementById('itemName').value = '';
                document.getElementById('price').value = '';
                setTimeout(loadOrders, 1500);
            } catch(e) {
                alert("Error de comunicación con el HQ.");
            } finally {
                btn.disabled = false;
                setOrderType(currentType);
            }
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
